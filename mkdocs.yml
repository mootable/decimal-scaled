site_name: decimal-scaled
site_description: Const-generic base-10 fixed-point decimals for Rust — bit-exact, 0.5 ULP, no_std-friendly.
site_url: https://mootable.github.io/decimal-scaled/
site_author: John Moxley
repo_url: https://github.com/mootable/decimal-scaled
repo_name: mootable/decimal-scaled
edit_uri: edit/main/docs/
copyright: A Mootable open-source project.

# Repo-facing material that lives under docs/ but must never become a
# site page: docs/_data/ holds the render_docs.py source data (its
# README would otherwise trip the strict nav.omitted_files gate), and
# *.draft files are work-in-progress, not publishable content.
exclude_docs: |
  _data/
  *.draft

# Links out of the docs tree (src/, benches/, macros/, root README,
# LICENSE-THIRD-PARTY, ...) use absolute GitHub URLs, which render
# correctly both on the published site and when the same file is
# viewed on GitHub — including the staged root pages (ROADMAP,
# CHANGELOG, ALGORITHMS, CONTRIBUTORS, SECURITY). That leaves every
# remaining relative link pointing inside the site, so unresolved
# relative links are real breakage: keep links.not_found at "warn"
# (fatal under the CI --strict build).
validation:
  nav:
    omitted_files: warn
    not_found: warn
    absolute_links: warn
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore

theme:
  name: material
  custom_dir: overrides   # overrides/partials/tabs-item.html adds the header dropdowns
  logo: assets/mootable-cow-dusk.svg
  favicon: assets/mootable-cow-dusk.svg
  font:
    text: Manrope
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky # most of the nav lives in the tabs; keep them visible on scroll
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
    - toc.integrate          # TOC lives inside the left nav, below the page list

extra_css:
  - stylesheets/extra.css
  - stylesheets/tabs-dropdown.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mootable/decimal-scaled
    - icon: fontawesome/brands/rust
      link: https://crates.io/crates/decimal-scaled
  generator: false

# Seven tabs (navigation.tabs renders each top-level entry as a tab).
# The first plain-path child of a section is its index page
# (navigation.indexes). ROADMAP / CHANGELOG / CONTRIBUTORS / SECURITY
# are root files staged into docs/ at build time by docs.yml (CI) and
# scripts/preview_docs.ps1 (local) — keep all three lists in step.
nav:
  - Home: index.md
  - Getting started:
      - getting-started.md
      - Decimal literals (d*! macros): macros.md
      - Strict vs fast transcendentals: strict-mode.md
      - Cargo features: features.md
  - Reference:
      - reference.md
      - The width family: widths.md
      - Rounding: rounding.md
      - Conversions: conversions.md
      - Serde: serde.md
      - Cross-scale operations: cross-scale.md
      - Glossary: glossary.md
  - Benchmarks & precision:
      - benchmarks.md
      - Library comparisons: comparisons.md
  - Architecture & internals:
      - Architecture: ARCHITECTURE.md
      - Algorithms: ALGORITHMS.md
      - Precision testing & golden validation: precision-testing.md
  - Project:
      - Roadmap: ROADMAP.md
      - Changelog: CHANGELOG.md
      - Contributing: CONTRIBUTORS.md
      - Security: SECURITY.md
      - Licensing: licensing.md
  - API reference (rustdoc): https://mootable.github.io/decimal-scaled/api/decimal_scaled/

markdown_extensions:
  - tables
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['docs']
      check_paths: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3
