[package]
name = "decimal-scale-test"
version = "0.1.0"
edition = "2021"
publish = false
description = "decimal-scaled test subjects + filterable golden gate over the decimal-scaled-golden harness"
license = "MIT OR Apache-2.0"

# This crate exists to isolate the heavy full-surface golden run (88 (width,scale)
# cells × every strict transcendental ≈ thousands of monomorphisations) from the
# core library's `cargo test`. The decimal-scaled features are mirrored here as
# passthroughs so each test target compiles under exactly the feature set it
# declares; the golden gate pins its wide tiers via `required-features`.
[dependencies]
decimal-scaled = { path = "..", default-features = false }
decimal-scaled-golden = { path = "../decimal-scaled-golden" }

[features]
default = ["std"]
std = ["decimal-scaled/std"]
alloc = ["decimal-scaled/alloc"]
wide = ["decimal-scaled/wide"]
x-wide = ["decimal-scaled/x-wide"]
xx-wide = ["decimal-scaled/xx-wide"]
macros = ["decimal-scaled/macros"]
serde = ["decimal-scaled/serde"]
dyn = ["decimal-scaled/dyn"]
strict = ["decimal-scaled/strict"]
fast = ["decimal-scaled/fast"]
cross-scale-ops = ["decimal-scaled/cross-scale-ops"]
rounding-half-away-from-zero = ["decimal-scaled/rounding-half-away-from-zero"]
rounding-half-toward-zero = ["decimal-scaled/rounding-half-toward-zero"]
rounding-trunc = ["decimal-scaled/rounding-trunc"]
rounding-floor = ["decimal-scaled/rounding-floor"]
rounding-ceiling = ["decimal-scaled/rounding-ceiling"]

# Serde wire-format round-trips in tests/api/serde.rs (JSON human-readable +
# postcard binary forms). Test-only.
[dev-dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
postcard = { version = "1", default-features = false, features = ["alloc"] }

[[test]]
name = "golden"
required-features = ["wide", "x-wide", "xx-wide"]
