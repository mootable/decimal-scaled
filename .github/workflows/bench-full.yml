name: "\U0001FA91 bench-full (matrix per width)"

# Full benchmark sweep across every width, fanned out as a matrix of
# parallel jobs. Each width gets its own runner with its own 6-hour
# per-job timeout — public-repo standard-runner minutes are unlimited,
# so the parallel fanout cost is zero in quota terms.
#
# Wall time ≈ max(per-width-sweep) rather than sum-of-all-widths.
#
# Triggers:
#   * workflow_dispatch (manual) — pick which family of benches to run
#     via the `bench_family` input.
#
# We do NOT auto-trigger on push. Each full run is multi-hour
# cumulative; running on every push would waste CI capacity and
# obscure regressions in the noise of unrelated changes.
#
# Standard runner: 2 vCPU, 7 GB RAM, 14 GB SSD; CPU is shared, so
# wall-clock numbers have 20–50 % run-to-run variance per the
# Criterion author. Use these for relative trends per width or
# regression detection — do NOT compare across runs as absolute
# numbers, and do NOT replace `docs/benchmarks.md` numbers (those
# come from a known dedicated machine).
#
# For < 1 % noise on the same shared runner pool, layer CodSpeed
# (codspeed.io OSS plan) on top of the `full_matrix_d*` benches in
# a follow-up workflow — see `research/free_bench_platforms_2026-05-18.md`.

on:
  workflow_dispatch:
    inputs:
      bench_family:
        description: "Which bench family to run on every width"
        required: true
        default: "full_matrix"
        type: choice
        options:
          - full_matrix
          - lib_cmp

permissions:
  contents: read

jobs:
  sweep:
    name: "\U0001FA91 ${{ inputs.bench_family }} D${{ matrix.width }}"
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h50; leaves slack under the 6h cap

    strategy:
      fail-fast: false
      # Parallel fanout — every width is its own runner. fail-fast: false
      # so one width's failure doesn't cancel the rest (per-width
      # numbers are independently valuable).
      matrix:
        include:
          # Narrow tier — always available; no extra features needed.
          - { width: "9",    features: "wide,x-wide,xx-wide,macros" }
          - { width: "18",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "38",   features: "wide,x-wide,xx-wide,macros" }
          # Wide tier — gated by `wide`.
          - { width: "57",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "76",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "115",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "153",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "230",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "307",  features: "wide,x-wide,xx-wide,macros" }
          # Extra-wide tier — gated by `x-wide`.
          - { width: "462",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "616",  features: "wide,x-wide,xx-wide,macros" }
          # Extra-extra-wide tier — gated by `xx-wide`.
          - { width: "924",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "1232", features: "wide,x-wide,xx-wide,macros" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo build outputs (per matrix cell)
        uses: actions/cache@v5
        with:
          path: target
          # Cache key includes the width because each per-width bench
          # binary has a unique compiled artefact set; sharing a single
          # cache across the matrix would race-condition.
          key: cargo-target-${{ runner.os }}-bench-D${{ matrix.width }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml', 'src/**', 'macros/src/**', 'benches/**') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-bench-D${{ matrix.width }}-

      - name: Show runner specs
        run: |
          echo "--- D${{ matrix.width }} sweep ---"
          echo "--- /proc/cpuinfo (model name + flags) ---"
          grep -E '^(model name|flags)' /proc/cpuinfo | head -8
          echo
          echo "--- nproc ---"
          nproc
          echo
          echo "--- memory ---"
          free -h

      - name: Run ${{ inputs.bench_family }}_d${{ matrix.width }}
        # Bench name is `<family>_d<width>` per the Cargo.toml
        # convention. The `--features` set passes every tier flag so
        # the per-width binary builds regardless of what the chosen
        # bench needs in terms of cross-tier comparators.
        run: cargo bench --bench ${{ inputs.bench_family }}_d${{ matrix.width }} --features ${{ matrix.features }}

      - name: Upload Criterion results (per width)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-${{ inputs.bench_family }}-D${{ matrix.width }}
          path: target/criterion/
          if-no-files-found: warn
          retention-days: 14
