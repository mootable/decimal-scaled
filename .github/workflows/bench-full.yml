name: "\U0001FA91 bench-full (matrix per width)"

# Full benchmark sweep across every width, fanned out as a matrix of
# parallel jobs. Each width gets its own runner with its own 6-hour
# per-job timeout â€” public-repo standard-runner minutes are unlimited,
# so the parallel fanout cost is zero in quota terms.
#
# Wall time â‰ˆ max(per-width-sweep) rather than sum-of-all-widths.
#
# Triggers:
#   * workflow_dispatch (manual) â€” pick which family of benches to run
#     via the `bench_family` input.
#
# We do NOT auto-trigger on push. Each full run is multi-hour
# cumulative; running on every push would waste CI capacity and
# obscure regressions in the noise of unrelated changes.
#
# Standard runner: 2 vCPU, 7 GB RAM, 14 GB SSD; CPU is shared, so
# wall-clock numbers have 20â€“50 % run-to-run variance per the
# Criterion author. Use these for relative trends per width or
# regression detection â€” do NOT compare across runs as absolute
# numbers, and do NOT replace `docs/benchmarks.md` numbers (those
# come from a known dedicated machine).
#
# For < 1 % noise on the same shared runner pool, layer CodSpeed
# (codspeed.io OSS plan) on top of the `full_matrix_d*` benches in
# a follow-up workflow â€” see `research/free_bench_platforms_2026-05-18.md`.

on:
  workflow_dispatch:
    inputs:
      bench_family:
        description: "Which bench family to run on every width"
        required: true
        default: "full_matrix"
        type: choice
        options:
          - full_matrix
          - lib_cmp

permissions:
  contents: read

jobs:
  sweep:
    name: "\U0001FA91 ${{ inputs.bench_family }} D${{ matrix.width }}"
    runs-on: ubuntu-latest
    timeout-minutes: 350  # ~5h50; leaves slack under the 6h cap

    strategy:
      fail-fast: false
      # Parallel fanout â€” every width is its own runner. fail-fast: false
      # so one width's failure doesn't cancel the rest (per-width
      # numbers are independently valuable).
      matrix:
        include:
          # Narrow tier â€” always available; no extra features needed.
          - { width: "9",    features: "wide,x-wide,xx-wide,macros" }
          - { width: "18",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "38",   features: "wide,x-wide,xx-wide,macros" }
          # Wide tier â€” gated by `wide`.
          - { width: "57",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "76",   features: "wide,x-wide,xx-wide,macros" }
          - { width: "115",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "153",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "230",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "307",  features: "wide,x-wide,xx-wide,macros" }
          # Extra-wide tier â€” gated by `x-wide`.
          - { width: "462",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "616",  features: "wide,x-wide,xx-wide,macros" }
          # Extra-extra-wide tier â€” gated by `xx-wide`.
          - { width: "924",  features: "wide,x-wide,xx-wide,macros" }
          - { width: "1232", features: "wide,x-wide,xx-wide,macros" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo build outputs (per matrix cell)
        uses: actions/cache@v5
        with:
          path: target
          # Cache key includes the width because each per-width bench
          # binary has a unique compiled artefact set; sharing a single
          # cache across the matrix would race-condition.
          key: cargo-target-${{ runner.os }}-bench-D${{ matrix.width }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml', 'src/**', 'macros/src/**', 'benches/**') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-bench-D${{ matrix.width }}-

      - name: Show runner specs
        run: |
          echo "--- D${{ matrix.width }} sweep ---"
          echo "--- /proc/cpuinfo (model name + flags) ---"
          grep -E '^(model name|flags)' /proc/cpuinfo | head -8
          echo
          echo "--- nproc ---"
          nproc
          echo
          echo "--- memory ---"
          free -h

      - name: Run ${{ inputs.bench_family }}_d${{ matrix.width }}
        # Bench name is `<family>_d<width>` per the Cargo.toml
        # convention. The `--features` set passes every tier flag so
        # the per-width binary builds regardless of what the chosen
        # bench needs in terms of cross-tier comparators.
        run: cargo bench --bench ${{ inputs.bench_family }}_d${{ matrix.width }} --features ${{ matrix.features }}

      - name: Upload Criterion results (per width)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-${{ inputs.bench_family }}-D${{ matrix.width }}
          path: target/criterion/
          if-no-files-found: warn
          retention-days: 14

  # ------------------------------------------------------------------
  # Self-refresh: once every per-width sweep cell has finished, collect
  # the Criterion artifacts this run produced and regenerate the parts
  # of docs/benchmarks.md they feed, committing the result straight back
  # to the branch the sweep ran on.
  #
  # A run carries one family's artifacts (the orchestrator dispatches
  # full_matrix and lib_cmp as separate runs), so this job regenerates
  # only what the present artifacts support:
  #   * criterion-full_matrix-D* -> Â§1â€“Â§3 tables (full_matrix_ingest.py --fill)
  #   * criterion-lib_cmp-D*      -> Â§5 figures (chart_gen, via medians.tsv)
  # bench-history artifacts live in a separate workflow's run, so the
  # history charts are only re-rendered if a prior step left them here.
  #
  # Release branches are not protected, so a github-actions[bot] commit
  # is fine here. The commit message carries NO attribution trailer â€”
  # the commit-hygiene gate would reject one, and we never want one.
  regenerate:
    name: "\U0001FA91 regenerate benchmarks.md (${{ inputs.bench_family }})"
    needs: sweep
    # Run even if some width cells failed: a partial sweep still
    # refreshes every cell it does have data for (missing leaves render
    # as `â€”`, never fabricated).
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      # Push the refreshed docs/benchmarks.md + docs/figures back to the
      # release branch this sweep ran on.
      contents: write

    steps:
      - name: Checkout the swept ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Guard â€” never self-commit to a default/protected branch
        env:
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          case "$REF" in
            main|master)
              echo "::error::refusing to self-commit benchmarks to '$REF'"
              exit 1
              ;;
          esac
          echo "Will refresh + commit benchmarks on '$REF'."

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Download every Criterion artifact from this run
        uses: actions/download-artifact@v4
        with:
          # No `name` -> pulls every artifact this run uploaded, each
          # into a subdir named after the artifact
          # (criterion-full_matrix-D9/, criterion-lib_cmp-D9/, ...) â€”
          # exactly the per-width layout both ingest scripts walk.
          path: bench-artifacts

      - name: Detect which artifact families are present
        id: present
        run: |
          set -euo pipefail
          full_matrix=false
          lib_cmp=false
          history=false
          if ls -d bench-artifacts/criterion-full_matrix-D* >/dev/null 2>&1; then
            full_matrix=true
          fi
          if ls -d bench-artifacts/criterion-lib_cmp-D* >/dev/null 2>&1; then
            lib_cmp=true
          fi
          if ls -d bench-artifacts/bench-history-* >/dev/null 2>&1; then
            history=true
          fi
          echo "full_matrix=$full_matrix" >> "$GITHUB_OUTPUT"
          echo "lib_cmp=$lib_cmp"         >> "$GITHUB_OUTPUT"
          echo "history=$history"         >> "$GITHUB_OUTPUT"
          echo "full_matrix=$full_matrix lib_cmp=$lib_cmp history=$history"

      - name: Fill Â§1â€“Â§3 tables from full_matrix artifacts
        if: steps.present.outputs.full_matrix == 'true'
        run: |
          set -euo pipefail
          python scripts/full_matrix_ingest.py --artifacts bench-artifacts --fill

      - name: Render Â§5 library-comparison figures from lib_cmp artifacts
        if: steps.present.outputs.lib_cmp == 'true'
        run: |
          set -euo pipefail
          mkdir -p target
          # Build target/medians.tsv from the fresh per-width lib_cmp
          # artifacts (no prior tsv to merge â€” a full sweep covers every
          # width), then render the figures chart_gen consumes.
          touch target/medians.tsv
          python scripts/lib_cmp_ingest.py \
            --artifacts bench-artifacts \
            --existing target/medians.tsv \
            --out target/medians.tsv
          cargo run --release --example chart_gen --features wide,x-wide,xx-wide,macros

      - name: Render history figures if history artifacts are present
        if: steps.present.outputs.history == 'true'
        run: |
          set -euo pipefail
          # chart_gen history reads bench-history-results/bench-history-<tag>/...
          mkdir -p bench-history-results
          cp -r bench-artifacts/bench-history-* bench-history-results/
          cargo run --release --example chart_gen --features wide,x-wide,xx-wide,macros history

      - name: Commit refreshed benchmarks back to the swept branch
        env:
          REF: ${{ github.ref_name }}
          FAMILY: ${{ inputs.bench_family }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmarks.md docs/figures
          if git diff --cached --quiet; then
            echo "No benchmark changes to commit."
            exit 0
          fi
          # Plain message, no attribution trailer (commit-hygiene gate).
          git commit -m "docs(benchmarks): regenerate from ${FAMILY} sweep"
          git push origin "HEAD:${REF}"
