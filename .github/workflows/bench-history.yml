name: "\U0001FA91 bench-history (cross-version comparison)"

# Like-for-like benchmark across published tags v0.2.5 .. v0.3.3 plus
# current HEAD. Same harness (bench-history/benches/comparison.rs), same
# input distributions, same operations — the only thing changing per
# cell is the `decimal-scaled` dependency version.
#
# Scope is deliberately minimal — directional read only:
#   * widths: D38, D76, D307
#   * functions: add, mul, div, sqrt_strict, ln_strict, sin_strict
#   * one SCALE per width
#
# Expand as the API surface stabilises (more widths, more functions).
#
# Trigger: workflow_dispatch only. Public-repo runner minutes are
# unlimited but per-cell wall time still adds up.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  history:
    name: "\U0001FA91 bench-history ${{ matrix.tag }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: "v0.2.5", source: "crates-io", version: "0.2.5" }
          # v0.3.0 + v0.3.1 dropped — shipped with an ungated D923 reference
          # in core_type.rs::widen() that fails to compile without xx-wide,
          # and xx-wide isn't a supported combo for the rest of the matrix.
          # The trend across v0.2.5 -> v0.3.2 -> v0.3.3 -> HEAD covers the
          # directional read this bench is for.
          - { tag: "v0.3.2", source: "crates-io", version: "0.3.2" }
          - { tag: "v0.3.3", source: "crates-io", version: "0.3.3" }
          - { tag: "v0.4.0", source: "crates-io", version: "0.4.0" }
          # v0.4.1 skipped — cosmetic only (dropped `DecimalConsts` alias);
          # no perf delta vs v0.4.0.
          - { tag: "v0.4.2", source: "crates-io", version: "0.4.2" }
          - { tag: "v0.4.3", source: "crates-io", version: "0.4.3" }
          - { tag: "HEAD",   source: "path",      version: "" }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-history-${{ runner.os }}-${{ matrix.tag }}-${{ hashFiles('bench-history/benches/comparison.rs') }}
          restore-keys: |
            cargo-history-${{ runner.os }}-${{ matrix.tag }}-
            cargo-history-${{ runner.os }}-

      - name: Pin dependency to ${{ matrix.tag }}
        working-directory: bench-history
        run: |
          set -euo pipefail
          if [ "${{ matrix.source }}" = "crates-io" ]; then
            sed -i "s|^decimal-scaled = .*|decimal-scaled = { version = \"=${{ matrix.version }}\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\"] }|" Cargo.toml
          else
            sed -i "s|^decimal-scaled = .*|decimal-scaled = { path = \"..\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\"] }|" Cargo.toml
          fi
          echo "--- effective Cargo.toml dep line ---"
          grep '^decimal-scaled' Cargo.toml

      - name: Show runner specs
        run: |
          echo "--- ${{ matrix.tag }} ---"
          grep -E '^(model name|flags)' /proc/cpuinfo | head -2
          nproc
          free -h

      - name: Run bench
        working-directory: bench-history
        # Single criterion run; same harness for every cell.
        run: cargo bench --bench comparison

      - name: Upload Criterion results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-history-${{ matrix.tag }}
          path: bench-history/target/criterion/
          if-no-files-found: warn
          retention-days: 30
