name: "\U0001FA91 bench-history (cross-version comparison)"

# Like-for-like benchmark across every published release (v0.2.5 .. v0.4.4)
# plus current HEAD. Same harness (bench-history/benches/comparison.rs),
# same inputs, same ops — the only thing changing per cell is the
# `decimal-scaled` dependency version. The harness now fans out over BOTH
# width AND scale, so the cross-version trend gains a scale dimension:
# a regression that only appears at a particular scale is visible in the
# table instead of hidden behind one canonical scale per width.
#
#   * widths: D38, D76, D307
#   * functions: add, mul, div, sqrt, ln, sin
#   * scales: {0, 9, 19, 28, 37} for EVERY width — the D38 tier's 5-point
#             {0, S/4, S/2, 3S/4, S-1} set, the largest such set that fits
#             the old lines' SCALE <= 38 FromStr/u128 window. The cross-
#             version cap forbids D76/D307's native high scales (they'd
#             overflow v0.2.x/v0.3.x); every version cell must run the
#             identical harness. See comparison.rs's module note.
#
# Job graph:
#   history   : matrix over VERSION. Each cell pins the dep, compiles the
#               harness ONCE for that version, runs every (width × scale)
#               group in a single criterion pass, uploads its criterion tree.
#   chart     : per-width cross-version PNG trend lines at the reference
#               scale (one line per function), via `chart_gen -- history`.
#   aggregate : merges every version cell, runs `summarise_history.py` ->
#               a (version × scale) trend table per (op × width) to the run
#               summary + ONE downloadable artifact (table .md + medians .tsv).
#
# Triggers: (1) pull_request into main (the PR-to-main review hook — advisory,
# NOT a required gate); (2) manual workflow_dispatch (on-demand, any branch).
# NO push trigger — on a branch this runs ONLY on demand; only
# bench-branch-compare auto-runs on push.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to benchmark as the HEAD cell (defaults to the branch the workflow is launched from)."
        required: false
        type: string
        default: ""

concurrency:
  group: bench-history-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  history:
    name: "\U0001FA91 bench-history ${{ matrix.tag }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          - { tag: "v0.2.5", source: "crates-io", version: "0.2.5" }
          # v0.3.0 + v0.3.1 dropped — shipped with an ungated D923 reference
          # in core_type.rs::widen() that fails to compile without xx-wide,
          # and xx-wide isn't a supported combo for the rest of the matrix.
          # The trend across v0.2.5 -> v0.3.2 -> v0.3.3 -> HEAD covers the
          # directional read this bench is for.
          - { tag: "v0.3.2", source: "crates-io", version: "0.3.2" }
          - { tag: "v0.3.3", source: "crates-io", version: "0.3.3" }
          - { tag: "v0.4.0", source: "crates-io", version: "0.4.0" }
          # v0.4.1 skipped — cosmetic only (dropped `DecimalConsts` alias);
          # no perf delta vs v0.4.0.
          - { tag: "v0.4.2", source: "crates-io", version: "0.4.2" }
          - { tag: "v0.4.3", source: "crates-io", version: "0.4.3" }
          - { tag: "v0.4.4", source: "crates-io", version: "0.4.4" }
          - { tag: "HEAD",   source: "path",      version: "" }   # current branch (0.5.0 in dev)

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # HEAD cell builds whatever ref you select (input wins; otherwise
          # the branch the run was launched from). Older cells ignore this —
          # they pin a published crates.io version, not the checkout.
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-history-${{ runner.os }}-${{ matrix.tag }}-${{ hashFiles('bench-history/benches/comparison.rs') }}
          restore-keys: |
            cargo-history-${{ runner.os }}-${{ matrix.tag }}-
            cargo-history-${{ runner.os }}-

      - name: Pin dependency to ${{ matrix.tag }}
        working-directory: bench-history
        run: |
          set -euo pipefail
          if [ "${{ matrix.source }}" = "crates-io" ]; then
            sed -i "s|^decimal-scaled = .*|decimal-scaled = { version = \"=${{ matrix.version }}\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\"] }|" Cargo.toml
          else
            sed -i "s|^decimal-scaled = .*|decimal-scaled = { path = \"..\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\"] }|" Cargo.toml
          fi
          echo "--- effective Cargo.toml dep line ---"
          grep '^decimal-scaled' Cargo.toml

      - name: Show runner specs
        run: |
          echo "--- ${{ matrix.tag }} ---"
          grep -E '^(model name|flags)' /proc/cpuinfo | head -2
          nproc
          free -h

      - name: Run bench (all width × scale groups for this version)
        working-directory: bench-history
        # Single criterion run; same harness for every cell. The (width ×
        # scale) fan-out is internal to the harness — one compile per version.
        run: cargo bench --bench comparison

      - name: Upload Criterion results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-history-${{ matrix.tag }}
          path: bench-history/target/criterion/
          if-no-files-found: warn
          retention-days: 30

  # Per-width cross-version PNG trend lines at the reference scale (one line
  # per function). The full (version × scale) surface is the aggregate table.
  chart:
    name: "\U0001F4C8 render cross-version history charts"
    needs: history
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Download all per-version criterion artifacts
        # Each artifact `bench-history-<tag>` unpacks to
        # tmp/bench-history-results/bench-history-<tag>/<op>_<width>_s<scale>/t/new/estimates.json
        # — exactly the layout `chart_gen -- history` reads.
        uses: actions/download-artifact@v8
        with:
          pattern: bench-history-*
          path: tmp/bench-history-results

      - name: Render cross-version history charts
        run: cargo run --release --example chart_gen -- history

      - name: Upload history charts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: history-charts
          path: docs/figures/history/*.png
          if-no-files-found: error
          retention-days: 30

  # Merge every version cell into the (version × scale) trend table.
  aggregate:
    name: "\U0001FA91 aggregate (version × scale trend table)"
    needs: history
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (for summarise_history.py)
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Download every per-version bench cell
        uses: actions/download-artifact@v8
        with:
          # Each artifact `bench-history-<tag>` unpacks into its own subdir
          # under hist-cells/ — exactly the layout summarise_history.py reads.
          pattern: bench-history-*
          path: hist-cells

      - name: Collate -> version × scale trend table (+ tsv + md)
        working-directory: bench-history
        env:
          PYTHONIOENCODING: utf-8
        run: |
          set -euo pipefail
          mkdir -p aggregate
          # The collator reads ../hist-cells (sibling of bench-history).
          ln -sfn ../hist-cells hist-cells
          python3 summarise_history.py --tsv aggregate/history_medians.tsv --md aggregate/history_table.md | tee aggregate/history_table.txt
          {
            echo ""
            cat aggregate/history_table.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload single aggregate artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bench-history-aggregate
          path: bench-history/aggregate/
          if-no-files-found: warn
          retention-days: 30
