name: "\U0001F4D6 docs"

# Builds the API documentation (rustdoc) plus the prose guides in
# `docs/` and publishes them to GitHub Pages.
#
# Triggers:
#   * a push to `main` (keeps the published docs current between
#     releases — release commits land on main first, then the tag
#     follows for tracking only);
#   * manual dispatch from the Actions tab.
#
# Tags do NOT trigger this workflow. The GitHub Pages environment is
# configured to allow deploys only from `main`, so a tag-triggered
# run would always fail at the `deploy` job with an
# environment-protection error. Worse, the concurrency group
# (`pages`) means a fast `git push main && git push --tag` sequence
# would cancel the in-flight main-push deploy and leave only the
# blocked tag run, stranding the docs site on the previous release.
# The 0.3.0 / 0.3.2 / 0.3.3 release lessons all converged on this:
# `main` is the canonical deploy trigger, tags are tracking labels
# only.
#
# One-time repo setup: Settings -> Pages -> Build and deployment ->
# Source: "GitHub Actions".

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Allow only one concurrent deployment.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.x"

      - name: Install MkDocs Material
        run: pip install mkdocs-material pymdown-extensions

      - name: Build rustdoc
        # `--all-features` is avoided: `experimental-floats` needs
        # the nightly toolchain. `wide` + `x-wide` + `xx-wide` +
        # `macros` is the widest stable-buildable set and documents
        # every shipped tier (D18 through D1232).
        run: cargo doc --no-deps --features wide,x-wide,xx-wide,macros --workspace
        env:
          # Fail the build on any rustdoc warning so broken intra-doc
          # links never reach the published site.
          RUSTDOCFLAGS: "-D warnings"

      - name: Stage root-level narrative files into docs/
        # MkDocs only reads under `docs/`. Copy the root pages the nav
        # references (ROADMAP, CHANGELOG, ALGORITHMS, CONTRIBUTORS,
        # SECURITY) in so they become first-class pages. README is NOT
        # staged — docs/index.md is the landing page; the root README
        # is reached via the GitHub link in the header. Keep this list
        # in sync with `$nav` in scripts/preview_docs.ps1 (the only
        # other copy) and the Project section of mkdocs.yml.
        run: |
          set -euo pipefail
          [ -f ROADMAP.md ]    && cp ROADMAP.md    docs/ROADMAP.md
          [ -f CHANGELOG.md ]  && cp CHANGELOG.md  docs/CHANGELOG.md
          [ -f ALGORITHMS.md ] && cp ALGORITHMS.md docs/ALGORITHMS.md
          [ -f CONTRIBUTORS.md ] && cp CONTRIBUTORS.md docs/CONTRIBUTORS.md
          [ -f SECURITY.md ]   && cp SECURITY.md   docs/SECURITY.md

      - name: Build MkDocs site
        run: mkdocs build --strict --site-dir _site

      - name: Layer the rustdoc tree under /api/
        run: |
          set -euo pipefail
          cp -r target/doc _site/api

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
