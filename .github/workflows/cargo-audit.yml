name: cargo-audit

# Scans the workspace's locked dependency graph against the RustSec
# advisory database. Fails the build if any advisory matches.
#
# Triggers:
#   * push to `main` — gate the integration branch;
#   * every PR — block landing a dep bump that introduces an
#     advisory;
#   * nightly cron (03:47 UTC, off-minute) — catch newly-published
#     advisories against deps that haven't moved since the last push.

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "47 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: RustSec advisory check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain (needed to generate Cargo.lock)
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Generate Cargo.lock (gitignored in this repo)
        run: cargo generate-lockfile

      - name: Run cargo audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
