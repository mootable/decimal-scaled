name: "\U0001FA91 bench-all (release sweep orchestrator)"

# One-click release benchmark sweep. Fans out to the three bench
# workflows that together make up a release-prep run:
#
#   * bench-full  (bench_family: full_matrix) — per-width function perf
#   * bench-full  (bench_family: lib_cmp)     — competitor comparison
#   * bench-history                           — cross-version over-time view
#
# Each target is itself a per-width matrix on its own runners, so this
# orchestrator only dispatches — it does no benching itself and returns
# in seconds. Watch the three triggered runs in the Actions tab.
#
# Trigger: workflow_dispatch only.

on:
  workflow_dispatch: {}

# `actions: write` lets the default GITHUB_TOKEN dispatch the three
# downstream workflow_dispatch workflows via the REST API.
permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    name: "\U0001FA91 dispatch release sweep"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dispatch the three bench workflows on this ref
        env:
          GH_TOKEN: ${{ github.token }}
          REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          echo "Dispatching release sweep on ref: $REF"
          gh workflow run bench-full.yml    --ref "$REF" -f bench_family=full_matrix
          gh workflow run bench-full.yml    --ref "$REF" -f bench_family=lib_cmp
          gh workflow run bench-history.yml --ref "$REF"
          echo "All three workflows dispatched. Track them in the Actions tab."
