name: "\U0001FA83 bench-branch-compare (vs 0.4.4)"

# Side-by-side Criterion comparison of the published 0.4.4 baseline against
# the branch under test, using the shared `bench-compare/benches/lib_compare.rs`
# harness. Both versions are linked into ONE binary (0.4.4 via the renamed
# `dec-sec-0-4-4` dep, the branch via the `path = ".."` dep) and run through
# the same six operators (add/sub/mul/div/rem/neg) across every shared width
# (D18 .. D1232). No third-party crates — pure self-vs-self.
#
# One run produces both columns: pair `arith/<W>/new/<op>` (the branch) against
# `arith/<W>/old/<op>` (0.4.4).
#
# Trigger: workflow_dispatch only. Default head = the branch the run is
# launched from.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to benchmark against the 0.4.4 baseline (defaults to the branch the run is launched from)."
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  compare:
    name: "\U0001FA83 0.4.4 vs ${{ inputs.ref || github.ref_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (${{ inputs.ref || github.ref_name }})
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-branch-compare-${{ runner.os }}-${{ hashFiles('bench-compare/benches/lib_compare.rs') }}
          restore-keys: |
            cargo-branch-compare-${{ runner.os }}-

      - name: Run side-by-side bench
        working-directory: bench-compare
        run: |
          set -euo pipefail
          echo "--- dep lines ---"; grep -E '^(decimal-scaled|dec-sec-0-4-4)' Cargo.toml
          cargo bench --bench lib_compare | tee bench.out

      - name: Summarise (new = branch, old = 0.4.4)
        if: always()
        working-directory: bench-compare
        run: |
          {
            echo "### bench-branch-compare: \`0.4.4\` (old) vs \`${{ inputs.ref || github.ref_name }}\` (new)"
            echo ''
            echo '`new/*` = the branch under test, `old/*` = the 0.4.4 baseline. Criterion timing lines:'
            echo ''
            echo '```'
            grep -E 'arith/|time:' bench.out || echo "(no timing lines captured — see artifact)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload criterion data + raw output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-branch-compare
          path: |
            bench-compare/bench.out
            bench-compare/target/criterion/
          if-no-files-found: warn
          retention-days: 30
