name: "\U0001FA83 bench-branch-compare (branch vs latest tag)"

# Side-by-side Criterion comparison of the latest published release ("prod",
# the baseline) against the branch under test, using the shared
# `bench-compare/benches/lib_compare.rs` harness. Both versions are linked into
# ONE binary (prod via the renamed `prod` dep pinned to the newest published
# version, the branch via the `path = ".."` dep) and run through the shared
# public-function surface across every shared width (D18 .. D1232). No
# third-party crates — pure self-vs-self.
#
# Purpose: dispatch on a release branch to see the performance changes that
# branch introduces vs the last release.
#
# One run produces both columns: pair `<group>/branch/<fn>` (the branch under
# test) against `<group>/prod/<fn>` (the latest published tag).
#
# Trigger: workflow_dispatch only. Default head = the branch the run is
# launched from. (The workflow lives on the default branch so it is
# dispatchable; every run targets the `ref` branch, not the default.)

on:
  # Commit listener: every push to a release branch benches it vs prod.
  # cancel-in-progress (below) means a newer commit supersedes an older run.
  push:
    branches:
      - 'release/**'
  # Asymmetric on-demand: run against any ref whenever you choose.
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to benchmark against prod, the latest published release (defaults to the branch the run is launched from)."
        required: false
        type: string
        default: ""

# One run per ref with a queue depth of 1: the in-progress bench finishes, and
# if commits landed during it, GitHub keeps only the LATEST as pending and runs
# that next (older pending runs are superseded). So every commit either gets its
# own bench or is rolled into the next run on the latest commit — none stranded.
concurrency:
  group: bench-branch-compare-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  compare:
    name: "\U0001FA83 prod vs ${{ inputs.ref || github.ref_name }}"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout (${{ inputs.ref || github.ref_name }})
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-branch-compare-${{ runner.os }}-${{ hashFiles('bench-compare/benches/lib_compare.rs') }}
          restore-keys: |
            cargo-branch-compare-${{ runner.os }}-

      - name: Pin prod to the latest published release
        working-directory: bench-compare
        run: |
          set -euo pipefail
          LATEST=$(curl -s https://crates.io/api/v1/crates/decimal-scaled | python3 -c "import sys,json; print(json.load(sys.stdin)['crate']['max_stable_version'])")
          echo "latest published tag = $LATEST"
          echo "PROD_VERSION=$LATEST" >> "$GITHUB_ENV"
          sed -i -E "s|^prod = .*|prod = { package = \"decimal-scaled\", version = \"=$LATEST\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\", \"xx-wide\"] }|" Cargo.toml

      - name: Run side-by-side bench
        working-directory: bench-compare
        run: |
          set -euo pipefail
          echo "--- dep lines ---"; grep -E '^(decimal-scaled|prod)' Cargo.toml
          cargo bench --bench lib_compare | tee bench.out

      - name: Summarise (branch vs prod table)
        if: always()
        working-directory: bench-compare
        env:
          BENCH_REF: ${{ inputs.ref || github.ref_name }}
        run: |
          python3 summarise.py >> "$GITHUB_STEP_SUMMARY" || {
            echo "### bench-branch-compare — summary parse failed; raw output:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            tail -100 bench.out >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          }

      - name: Upload criterion data + raw output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-branch-compare
          path: |
            bench-compare/bench.out
            bench-compare/target/criterion/
          if-no-files-found: warn
          retention-days: 30
