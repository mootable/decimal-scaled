name: "\U0001FA83 bench-branch-compare (branch vs latest tag)"

# Side-by-side Criterion comparison of the latest published release ("prod",
# the baseline) against the branch under test, using the shared
# `bench-compare/benches/compare_common.rs` harness. Both versions are linked
# into each per-width bench binary (prod via the renamed `prod` dep pinned to
# the newest published version, the branch via the `path = ".."` dep) and run
# through the shared public-function surface.
#
# The harness is split ONE bench target per width (compare_d18 .. compare_d1232)
# and fanned out as a matrix of parallel jobs — each job benches a single width
# (branch + prod rows) in ~30 min instead of one >90 min sweep over every width.
# Wall time ≈ the slowest single width. No third-party crates — pure self-vs-self.
#
# Purpose: dispatch on a release branch to see the performance changes that
# branch introduces vs the last release.
#
# Each per-width run produces both columns: pair `<group>/<W>/branch` (the
# branch under test) against `<group>/<W>/prod` (the latest published tag).
# A final collator job downloads every width's Criterion artifacts and renders
# ONE combined branch-vs-prod Δ% table into the run summary.
#
# Triggers: (1) push to a release branch — a commit listener that benches the
# branch automatically (queue-of-1 via the concurrency block); (2) manual
# workflow_dispatch for on-demand runs against any ref. Push runs from the
# branch itself, so this does NOT need to live on the default branch.

on:
  # Commit listener: every push to a release branch benches it vs prod.
  push:
    branches:
      - 'release/**'
  # Asymmetric on-demand: run against any ref whenever you choose.
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch / tag / SHA to benchmark against prod, the latest published release (defaults to the branch the run is launched from)."
        required: false
        type: string
        default: ""

# One run per ref with a queue depth of 1: the in-progress bench finishes, and
# if commits landed during it, GitHub keeps only the LATEST as pending and runs
# that next (older pending runs are superseded). So every commit either gets its
# own bench or is rolled into the next run on the latest commit — none stranded.
concurrency:
  group: bench-branch-compare-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  compare:
    name: "\U0001FA83 prod vs ${{ inputs.ref || github.ref_name }} (${{ matrix.width }})"
    runs-on: ubuntu-latest
    # One width per job. A single width's branch+prod surface runs in well
    # under 30 min, so this fits comfortably where the old single-job sweep
    # over every width needed 240. Per-width cells are independently valuable.
    timeout-minutes: 30

    strategy:
      fail-fast: false
      # Parallel fanout — every width is its own runner. fail-fast: false so
      # one width's failure doesn't cancel the rest, and the collator still
      # renders every width that did finish.
      matrix:
        width:
          - D18
          - D38
          - D57
          - D76
          - D115
          - D153
          - D230
          - D307
          - D462
          - D616
          - D924
          - D1232

    steps:
      - name: Checkout (${{ inputs.ref || github.ref_name }})
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install system libs
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-branch-compare-${{ runner.os }}-${{ matrix.width }}-${{ hashFiles('bench-compare/benches/compare_common.rs') }}
          restore-keys: |
            cargo-branch-compare-${{ runner.os }}-${{ matrix.width }}-
            cargo-branch-compare-${{ runner.os }}-

      - name: Pin prod to the latest published release
        working-directory: bench-compare
        run: |
          set -euo pipefail
          LATEST=$(curl -s -H 'User-Agent: decimal-scaled-bench (github.com/mootable/decimal-scaled)' https://crates.io/api/v1/crates/decimal-scaled | python3 -c "import sys,json; d=json.load(sys.stdin); c=d['crate']; print(c.get('max_stable_version') or c['newest_version'])")
          echo "latest published tag = $LATEST"
          echo "PROD_VERSION=$LATEST" >> "$GITHUB_ENV"
          sed -i -E "s|^prod = .*|prod = { package = \"decimal-scaled\", version = \"=$LATEST\", default-features = false, features = [\"std\", \"strict\", \"wide\", \"x-wide\", \"xx-wide\"] }|" Cargo.toml

      - name: Run side-by-side bench (${{ matrix.width }})
        working-directory: bench-compare
        run: |
          set -euo pipefail
          echo "--- dep lines ---"; grep -E '^(decimal-scaled|prod)' Cargo.toml
          WIDTH_LC=$(echo "${{ matrix.width }}" | tr '[:upper:]' '[:lower:]')
          cargo bench --bench "compare_${WIDTH_LC}" | tee "bench-${{ matrix.width }}.out"

      - name: Upload criterion data + raw output (${{ matrix.width }})
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-branch-compare-${{ matrix.width }}
          path: |
            bench-compare/bench-${{ matrix.width }}.out
            bench-compare/target/criterion/
          if-no-files-found: warn
          retention-days: 30

  # ------------------------------------------------------------------
  # Collator: once every per-width job has finished (or failed), download
  # all per-width Criterion artifacts into one merged `target/criterion`
  # tree and run summarise.py to render ONE combined branch-vs-prod Δ%
  # table — covering every width — into the run's step summary.
  collate:
    name: "\U0001FA83 combined branch-vs-prod table"
    needs: [compare]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (for summarise.py)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Re-derive prod version for the table header
        run: |
          set -euo pipefail
          LATEST=$(curl -s -H 'User-Agent: decimal-scaled-bench (github.com/mootable/decimal-scaled)' https://crates.io/api/v1/crates/decimal-scaled | python3 -c "import sys,json; d=json.load(sys.stdin); c=d['crate']; print(c.get('max_stable_version') or c['newest_version'])")
          echo "PROD_VERSION=$LATEST" >> "$GITHUB_ENV"

      - name: Download every per-width artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # No `name` -> pulls every artifact this run uploaded, each into a
          # subdir named after the artifact (bench-branch-compare-D18/, ...).
          # Each holds that width's target/criterion subtree + raw .out.
          path: bench-artifacts

      - name: Merge per-width criterion dirs
        run: |
          set -euo pipefail
          mkdir -p bench-compare/target/criterion
          # Each artifact dir contains a `target/criterion/<group>/...` tree.
          # The group names embed the width (`<fn>/<W>`), so merging every
          # width's subtree into one criterion root yields no collisions.
          shopt -s nullglob
          for d in bench-artifacts/bench-branch-compare-*/target/criterion; do
            echo "merging $d"
            cp -a "$d/." bench-compare/target/criterion/
          done
          echo "--- merged groups ---"
          ls bench-compare/target/criterion | head -50

      - name: Summarise (one combined branch-vs-prod table)
        if: always()
        working-directory: bench-compare
        env:
          BENCH_REF: ${{ inputs.ref || github.ref_name }}
        run: |
          python3 summarise.py >> "$GITHUB_STEP_SUMMARY" || {
            echo "### bench-branch-compare — summary parse failed; raw per-width output:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            find ../bench-artifacts -name 'bench-*.out' -exec tail -40 {} \; >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          }

      - name: Upload merged criterion data
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: bench-branch-compare-merged
          path: bench-compare/target/criterion/
          if-no-files-found: warn
          retention-days: 30
