name: "\U0001F4D0 precision (0.5 ULP gate)"

# 0.5 ULP correctness gate. NON-OVERRIDABLE — a failed precision
# check blocks merge unconditionally. The crate's headline contract
# is correctly-rounded 0.5 ULP for strict transcendentals, identical
# bit patterns across platforms; perf tuning never trades that away.
#
# Runs only the precision-specific test files (fast — under 1 min
# per the per-file scope). The wider unit-test suite is not part of
# this gate; if you need it, run `cargo test` locally.
#
# Branch-protection rule: mark this workflow's check as Required on
# the `main` branch in repo settings. No override path.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: precision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precision:
    name: precision
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-precision-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-precision-${{ runner.os }}-

      - name: Run 0.5 ULP precision suites
        # --release so the integer-only kernels match the production
        # codegen path; debug builds occasionally route differently.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test precision_strict_05_ulp \
            --test precision_wide_baseline \
            --test wide_strict_transcendentals \
            --test narrow_strict_transcendentals

      - name: Run mpmath-oracle golden suite (harness-based gate)
        # THE harness-based gate. `ulp_strict_golden` drives decimal-scaled
        # as the reference PrecisionSubject through the shared precision
        # harness (tests/support/), folding the 500-digit mpmath oracle to
        # the correctly-rounded integer under each of the six rounding modes
        # and asserting lsbe == 0 (0 storage LSB) at every tier's
        # design-target SCALE. The harness's own LSBε/ULP accounting and
        # fairness fold are unit-tested by `precision_harness_smoke`, run
        # alongside so a broken harness can't mask a kernel regression.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test ulp_strict_golden \
            --test precision_harness_smoke

      - name: Run proptest ULP fuzz suite
        # Property-based identity coverage at D38<19> with a D76<19>
        # cross-tier witness. Deterministic seed; 100 cases per
        # block. Fixed in scope so runtime stays inside the
        # precision-gate budget.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test ulp_proptest

      - name: Upload committed decimal-scaled precision result
        # The committed reference TSV the harness scores against — the
        # single source of truth for the README precision tables. Uploaded
        # for at-a-glance inspection of the gated run; the refresh of this
        # file is owned by the lib-cmp-precision workflow, not this gate.
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: precision-decimal-scaled-tsv
          path: results/precision/decimal_scaled.tsv
          if-no-files-found: warn
          retention-days: 14
