name: "\U0001F4D0 precision (0.5 ULP gate)"

# 0.5 ULP correctness gate. NON-OVERRIDABLE — a failed precision
# check blocks merge unconditionally. The crate's headline contract
# is correctly-rounded 0.5 ULP for strict transcendentals, identical
# bit patterns across platforms; perf tuning never trades that away.
#
# Runs only the precision-specific test files (fast — under 1 min
# per the per-file scope). The wider unit-test suite is not part of
# this gate; if you need it, run `cargo test` locally.
#
# Branch-protection rule: mark this workflow's check as Required on
# the `main` branch in repo settings. No override path.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: precision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  precision:
    name: precision
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-precision-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-precision-${{ runner.os }}-

      - name: Run 0.5 ULP precision suites
        # --release so the integer-only kernels match the production
        # codegen path; debug builds occasionally route differently.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test precision_strict_05_ulp \
            --test precision_wide_baseline \
            --test wide_strict_transcendentals \
            --test narrow_strict_transcendentals

      - name: Run mpmath-oracle golden suite (D38..D1232)
        # External oracle: each tier's strict surface is asserted
        # against a 500-digit mpmath truth table at the tier's
        # design-target SCALE. Catches kernel bugs that internal
        # cross-witness paths mirror and miss.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test ulp_strict_golden

      - name: Run proptest ULP fuzz suite
        # Property-based identity coverage at D38<19> with a D76<19>
        # cross-tier witness. Deterministic seed; 100 cases per
        # block. Fixed in scope so runtime stays inside the
        # precision-gate budget.
        run: |
          cargo test --release --features wide,x-wide,xx-wide,macros \
            --test ulp_proptest
