name: "\U0001F4CF lib-cmp precision (LSBε shootout refresh)"

# Comparative precision shootout. Runs the ONE precision-comparison path —
# the `lib_cmp_precision` bin in `golden-competitors`, built on the
# `decimal-scaled-golden` harness that also backs the golden gate. The
# runner sweeps (function × width × scale) over decimal-scaled plus the six
# peer libraries, scores every cell against the multi-oracle golden set,
# and WRITES the deterministic per-library result files under
# results/precision/<library>.tsv — the single source of truth the README
# precision tables render from.
#
# Compile ONCE, then fan out (the golden-quick/history pattern, owner
# 2026-06-12): the build job compiles the runner with capped parallelism
# (the full-width live crate + seven peer crates OOM the hosted runner at
# default -j — the exit-143 class) and stages just the binary; each stripe
# downloads it and sweeps its GOLDEN_STRIPE row partition (the bin's
# `Filter::from_env()` is the same harness filter the golden gate uses);
# the aggregate job splices the per-library partial TSVs (one header set,
# data rows merged and canonically sorted) and self-commits the result
# back to the branch the run executed on. The per-stripe REPORT renders
# are uploaded as stripe artifacts; the committed TSVs are the truth the
# docs pipeline re-renders from.
#
# Triggers (advisory — NOT a required status check / merge gate):
#   * pull_request (base = main) — runs on any PR INTO main so a kernel
#     change that shifts an LSBε cell or a fidelity grade shows up under
#     review.
#   * workflow_dispatch — manual run on any branch (the dispatch button
#     only appears once this file is on the default branch main).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  STRIPE_COUNT: "10"

concurrency:
  group: lib-cmp-precision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      stripes: ${{ steps.gen.outputs.stripes }}
    steps:
      - name: Generate stripe indices
        id: gen
        run: echo "stripes=$(python3 -c "import json, os; print(json.dumps(list(range(int(os.environ['STRIPE_COUNT'])))))")" >> "$GITHUB_OUTPUT"

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # The release compile of golden-competitors (seven peer crates + the
      # live crate at full width) starves the hosted runner's memory at
      # default parallelism — "runner lost communication" (the exit-143
      # class fixed the same way in ci.yml and history.yml, 2026-06-12).
      # -j 1: the kill survived -j 2 AND the debuginfo drop — serialize
      # fully while the in-step memory sampler establishes the real curve.
      CARGO_BUILD_JOBS: "1"
      # The workspace sets `[profile.release] debug = true` (local samply
      # symbolization). Generating full debuginfo over the full-width
      # monomorphised subject surface is what OOM-kills the single rustc
      # compiling golden-competitors (exit 143 survives -j 2). The staged
      # exe is only ever executed by the stripes — debuginfo serves
      # nothing here, so drop it for this build alone.
      CARGO_PROFILE_RELEASE_DEBUG: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-libcmp-precision-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'golden-competitors/Cargo.toml') }}
          restore-keys: |
            cargo-libcmp-precision-${{ runner.os }}-

      - name: Compile the precision runner (release)
        # The sampler prints available memory every 15 s beside the compile
        # so an exit-143 kill leaves a memory curve in the log (diagnosis
        # evidence, not guesswork — the kill has now survived -j 2 and the
        # debuginfo drop).
        run: |
          set -euo pipefail
          ( while true; do m=$(free -m | awk '/^Mem:/{print $7}'); d=$(df -BM --output=avail . | tail -1 | tr -dc 0-9); echo "[res $(date +%H:%M:%S)] mem avail ${m} MB | disk avail ${d} MB"; sleep 15; done ) &
          SAMPLER=$!
          cargo build --release -p golden-competitors --bin lib_cmp_precision
          kill "$SAMPLER" || true

      - name: Stage the runner exe
        run: |
          set -euo pipefail
          mkdir -p staged
          cp target/release/lib_cmp_precision staged/lib_cmp_precision
          chmod +x staged/lib_cmp_precision

      - name: Upload the runner exe
        uses: actions/upload-artifact@v7
        with:
          name: lib-cmp-precision-exe
          path: staged/
          if-no-files-found: error
          retention-days: 3

  shoot:
    name: shoot (stripe ${{ matrix.stripe }})
    needs: [plan, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        stripe: ${{ fromJSON(needs.plan.outputs.stripes) }}
    steps:
      - name: Checkout (golden data)
        uses: actions/checkout@v6

      - name: Download the runner exe
        uses: actions/download-artifact@v8
        with:
          name: lib-cmp-precision-exe

      - name: Run stripe ${{ matrix.stripe }}/${{ env.STRIPE_COUNT }}
        env:
          GOLDEN_STRIPE: "${{ matrix.stripe }}/${{ env.STRIPE_COUNT }}"
          GOLDEN_DIR: ${{ github.workspace }}/decimal-scaled-golden/golden
          PYTHONIOENCODING: utf-8
        # Timestamped, streamed output (slow-vs-stuck decidable from the
        # live log — the history.yml lesson); the stripe's REPORT render is
        # kept as an artifact beside its partial TSVs.
        run: |
          set -euo pipefail
          chmod +x lib_cmp_precision
          mkdir -p results/precision
          ./lib_cmp_precision 2>&1 \
            | awk '{ print strftime("[%H:%M:%S]"), $0; fflush() }' \
            | tee results/precision/REPORT-stripe-${{ matrix.stripe }}.md
          exit "${PIPESTATUS[0]}"

      - name: Upload stripe partials (TSVs + report)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lib-cmp-precision-stripe-${{ matrix.stripe }}
          path: results/precision/
          if-no-files-found: error
          retention-days: 7

  aggregate:
    name: aggregate + self-commit
    needs: [plan, shoot]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Push the regenerated results/precision/*.tsv back to the branch
      # this run executed on (the bench-full.yml self-refresh pattern).
      contents: write
    steps:
      - name: Checkout (for the self-commit)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download all stripe partials
        uses: actions/download-artifact@v8
        with:
          pattern: lib-cmp-precision-stripe-*
          path: stripes/

      - name: Splice the per-library TSVs (one header set, canonical row order)
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import os, glob
          out_dir = "results/precision"
          os.makedirs(out_dir, exist_ok=True)
          # Discover the per-library file names across every stripe.
          names = sorted({os.path.basename(p)
                          for p in glob.glob("stripes/*/**/*.tsv", recursive=True)})
          assert names, "no stripe TSVs downloaded"
          for name in names:
              headers, rows = None, []
              for part in sorted(glob.glob(f"stripes/*/**/{name}", recursive=True)):
                  with open(part, encoding="utf-8") as f:
                      lines = f.read().splitlines()
                  h = [l for l in lines if l.startswith("#")]
                  headers = headers or h
                  rows += [l for l in lines if l and not l.startswith("#")]
              # Canonical order: the key columns (method, width, scale,
              # rounding) — deterministic regardless of stripe timing.
              def key(line):
                  c = line.split("\t")
                  return (c[0], int(c[1]) if c[1].isdigit() else c[1],
                          int(c[2]) if c[2].isdigit() else c[2], c[3])
              rows = sorted(set(rows), key=key)
              with open(os.path.join(out_dir, name), "w", encoding="utf-8", newline="\n") as f:
                  f.write("\n".join(headers + rows) + "\n")
              print(f"{name}: {len(rows)} rows")
          EOF

      - name: Upload the combined results
        uses: actions/upload-artifact@v7
        with:
          name: lib-cmp-precision-results
          path: results/precision/*.tsv
          if-no-files-found: error

      - name: Commit refreshed precision results back to the run's branch
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/precision/*.tsv
          if git diff --cached --quiet; then
            echo "results unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "results(precision): refresh from the striped lib-cmp run"
          git push origin "HEAD:$REF"
