name: "\U0001F4CF lib-cmp precision (LSBε shootout refresh)"

# Comparative precision shootout. Runs the ONE precision-comparison path —
# the `lib_cmp_precision` bin in `golden-competitors`, built on the
# `decimal-scaled-golden` harness that also backs the golden gate. The
# runner sweeps (function × width × scale) over decimal-scaled plus the six
# peer libraries, scores every cell against the multi-oracle golden set,
# and WRITES the deterministic per-library result files under
# results/precision/<library>.tsv — the single source of truth the README
# precision tables render from.
#
# SHARDED BY WIDTH, SCORED AT THE CANONICAL MID SCALE ONLY (owner
# 2026-06-12): one job per width, each building its own SLIM runner
# (`--features <tier>` via the passthroughs in golden-competitors/
# Cargo.toml) and sweeping ONLY that width's canonical S/2 cell
# (GOLDEN_WIDTHS + GOLDEN_SCALES — the same scale the shootout tables
# render at, so the committed TSVs and the README tables stay in step).
# The single full-width binary is NOT buildable on a hosted runner — one
# rustc carrying all 88 cells' monomorphisations peaks past the 16 GB the
# runner has (proven by the in-step sampler, run 27393313247: 15.9 GB
# used / 80 MB avail at -j 1 → SIGTERM, exit 143). Sharding bounds every
# compile to one tier's surface. The aggregate job splices the
# per-library partial TSVs (one header set, data rows merged and
# canonically sorted) and self-commits the result back to the branch the
# run executed on. No historical decimal-scaled version is anywhere in
# this path (decimal-scale-test's ds-044/ds-033 pins are optional,
# history-gate-only features — never enabled here).
#
# Triggers (advisory — NOT a required status check / merge gate):
#   * pull_request (base = main) — runs on any PR INTO main so a kernel
#     change that shifts an LSBε cell or a fidelity grade shows up under
#     review.
#   * workflow_dispatch — manual run on any branch (the dispatch button
#     only appears once this file is on the default branch main).

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lib-cmp-precision-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shoot:
    name: shoot (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        # One shard per WIDTH. d18/d38 share the narrow base build (no
        # tier feature); each shard sweeps exactly its width's canonical
        # mid-scale cell via GOLDEN_WIDTHS/GOLDEN_SCALES (which also stops
        # wider builds re-running the base D18/D38 cells). The scale is
        # each width's `canonical_scale` in lib_cmp_precision.rs — keep
        # the two lists in step.
        include:
          - { shard: d18,   feat: "",      width: 18,   scale: 9 }
          - { shard: d38,   feat: "",      width: 38,   scale: 19 }
          - { shard: d57,   feat: "d57",   width: 57,   scale: 28 }
          - { shard: d76,   feat: "d76",   width: 76,   scale: 38 }
          - { shard: d115,  feat: "d115",  width: 115,  scale: 57 }
          - { shard: d153,  feat: "d153",  width: 153,  scale: 76 }
          - { shard: d230,  feat: "d230",  width: 230,  scale: 115 }
          - { shard: d307,  feat: "d307",  width: 307,  scale: 153 }
          - { shard: d462,  feat: "d462",  width: 462,  scale: 231 }
          - { shard: d616,  feat: "d616",  width: 616,  scale: 308 }
          - { shard: d924,  feat: "d924",  width: 924,  scale: 462 }
          - { shard: d1232, feat: "d1232", width: 1232, scale: 616 }
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-libcmp-precision-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'golden-competitors/Cargo.toml') }}
          restore-keys: |
            cargo-libcmp-precision-${{ runner.os }}-

      - name: Compile the shard runner (release)
        env:
          # Modest insurance on a now-slim build: two parallel rustc
          # units, and no release debuginfo (the workspace keeps
          # `debug = true` for local samply; it serves nothing here).
          CARGO_BUILD_JOBS: "2"
          CARGO_PROFILE_RELEASE_DEBUG: "false"
        run: |
          set -euo pipefail
          ( while true; do m=$(free -m | awk '/^Mem:/{print $7}'); echo "[res $(date +%H:%M:%S)] mem avail ${m} MB"; sleep 30; done ) &
          SAMPLER=$!
          FEAT="${{ matrix.feat }}"
          cargo build --release -p golden-competitors --bin lib_cmp_precision ${FEAT:+--features "$FEAT"}
          kill "$SAMPLER" || true

      - name: Run the shard sweep (canonical mid-scale cell only)
        env:
          GOLDEN_DIR: ${{ github.workspace }}/decimal-scaled-golden/golden
          GOLDEN_WIDTHS: "${{ matrix.width }}"
          GOLDEN_SCALES: "${{ matrix.scale }}"
          PYTHONIOENCODING: utf-8
        # Timestamped, streamed output (slow-vs-stuck decidable from the
        # live log); the shard's REPORT render is kept as an artifact
        # beside its partial TSVs.
        run: |
          set -euo pipefail
          mkdir -p results/precision
          ./target/release/lib_cmp_precision 2>&1 \
            | awk '{ print strftime("[%H:%M:%S]"), $0; fflush() }' \
            | tee results/precision/REPORT-shard-${{ matrix.shard }}.md
          exit "${PIPESTATUS[0]}"

      - name: Upload shard partials (TSVs + report)
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: lib-cmp-precision-shard-${{ matrix.shard }}
          path: results/precision/
          if-no-files-found: error
          retention-days: 7

  aggregate:
    name: aggregate + self-commit
    needs: [shoot]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      # Push the regenerated results/precision/*.tsv back to the branch
      # this run executed on (the bench-full.yml self-refresh pattern).
      contents: write
    steps:
      - name: Checkout (for the self-commit)
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Download all shard partials
        uses: actions/download-artifact@v8
        with:
          pattern: lib-cmp-precision-shard-*
          path: shards/

      - name: Splice the per-library TSVs (one header set, canonical row order)
        run: |
          set -euo pipefail
          python3 - <<'EOF'
          import os, glob
          out_dir = "results/precision"
          os.makedirs(out_dir, exist_ok=True)
          # Discover the per-library file names across every shard.
          names = sorted({os.path.basename(p)
                          for p in glob.glob("shards/*/**/*.tsv", recursive=True)})
          assert names, "no shard TSVs downloaded"
          for name in names:
              headers, rows = None, []
              for part in sorted(glob.glob(f"shards/*/**/{name}", recursive=True)):
                  with open(part, encoding="utf-8") as f:
                      lines = f.read().splitlines()
                  h = [l for l in lines if l.startswith("#")]
                  headers = headers or h
                  rows += [l for l in lines if l and not l.startswith("#")]
              # Canonical order: the key columns (method, width, scale,
              # rounding) — deterministic regardless of shard timing.
              def key(line):
                  c = line.split("\t")
                  return (c[0], int(c[1]) if c[1].isdigit() else c[1],
                          int(c[2]) if c[2].isdigit() else c[2], c[3])
              rows = sorted(set(rows), key=key)
              with open(os.path.join(out_dir, name), "w", encoding="utf-8", newline="\n") as f:
                  f.write("\n".join(headers + rows) + "\n")
              print(f"{name}: {len(rows)} rows")
          EOF

      - name: Upload the combined results
        uses: actions/upload-artifact@v7
        with:
          name: lib-cmp-precision-results
          path: results/precision/*.tsv
          if-no-files-found: error

      - name: Commit refreshed precision results back to the run's branch
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add results/precision/*.tsv
          if git diff --cached --quiet; then
            echo "results unchanged — nothing to commit"
            exit 0
          fi
          git commit -m "results(precision): refresh from the width-sharded lib-cmp run"
          git push origin "HEAD:$REF"
