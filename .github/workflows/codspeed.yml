name: "\U0001F406 CodSpeed"

on:
  push:
    branches:
      - "main"
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  codspeed:
    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Rust toolchain, cache and cargo-codspeed
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache-target: release
          bins: cargo-codspeed

      - name: Install system libs (fontconfig for plotters dev-dep)
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Build the benchmark targets
        # `pr_gate` covers D57<20> and D307<150> hot paths — requires
        # the wide / x-wide feature gates so those types are visible.
        # Features are additive at build time; harmless for the
        # narrow-only `all_functions` bench that doesn't reach for
        # them.
        run: cargo codspeed build --features wide,x-wide,xx-wide,macros --bench all_functions --bench pr_gate --bench mul_div_candidates

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run
