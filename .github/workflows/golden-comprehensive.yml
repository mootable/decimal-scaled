name: "🔬 golden (comprehensive)"

# The FULL unsampled golden sweep: the `decimal-scale-test` gate over every
# band-edge (width, scale) cell x EVERY golden row x ALL SIX rounding modes —
# the per-push `ci` → `golden (gate)` job runs the same sweep row-SAMPLED
# (GOLDEN_SAMPLE=10) for latency; this is the every-row deep pass. Multi-hour
# at the wide tiers, so it lives in its OWN concurrency queue (queue-of-one),
# kept off the `ci` and `bench-branch-compare` queues: a deep golden pass must
# never delay a pre-merge gate or a perf compare, and must not be starved by
# them.
#
# Trigger: workflow_dispatch only — run on demand against ANY ref (e.g.
# release/0.5.0 to deep-verify a precision-sensitive change, or main before a
# release). Manual-only by design: every multi-hour comprehensive run is then
# deliberate, never auto-kicked by a push. The optional inputs map to the
# gate's GOLDEN_* env filters to narrow the sweep (e.g. funcs `exp,cosh`,
# widths `924,1232`).

on:
  workflow_dispatch:
    inputs:
      funcs:
        description: "GOLDEN_FUNCS comma list (e.g. exp,cosh; empty = ALL functions)"
        required: false
        default: ""
      widths:
        description: "GOLDEN_WIDTHS comma list (e.g. 924,1232; empty = ALL widths)"
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  # Own queue, independent of `ci` and `bench-branch-compare`. Queue-of-one:
  # let the in-progress sweep finish (don't waste a multi-hour run), and let a
  # newer push supersede only the QUEUED run.
  group: golden-comprehensive-${{ github.ref }}
  cancel-in-progress: false

jobs:
  comprehensive:
    name: golden (comprehensive)
    runs-on: ubuntu-latest
    # The auto-discovered sweep is multi-hour at the wide tiers; allow the
    # GitHub-hosted job maximum.
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-golden-comprehensive-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-golden-comprehensive-${{ runner.os }}-

      - name: Comprehensive all-mode golden sweep (release, every row)
        # `-p decimal-scale-test` scopes the build to the gate crate (the
        # root crate's bench dev-deps never compile, so no fontconfig).
        # No GOLDEN_SAMPLE: every golden row runs, across all six rounding
        # modes. `--nocapture` streams the per-subject failures so a long
        # run is not opaque. The optional inputs narrow the sweep.
        env:
          GOLDEN_FUNCS: ${{ github.event.inputs.funcs }}
          GOLDEN_WIDTHS: ${{ github.event.inputs.widths }}
        run: |
          cargo test -p decimal-scale-test --release --test golden \
            golden_all_modes -- --ignored --nocapture
