name: "\U0001FA91 bench-trial"

# Trial benchmark workflow — runs a focused subset of the crate's
# Criterion benches on GitHub-hosted Linux runners and uploads the
# `target/criterion/` artefact for download.
#
# Goals:
#   * Prove GitHub Actions is a viable home for our bench workflow
#     without leaving the local laptop free for development.
#   * Stay under the 6-hour per-job timeout — picks the fast
#     `quick_div` bench (~30 s wall) so the trial round-trip is
#     dominated by checkout + toolchain install + build, not the
#     benchmark itself.
#   * Manual trigger only. We do NOT auto-run on push because every
#     run would burn the unlimited-but-shared CI capacity.
#
# Once this trial passes, the next step is to add a second job that
# runs the longer `full_matrix_d*` or `lib_cmp_d*` sweeps split per
# width so each fits the 6 h cap.
#
# Standard runner spec (2 vCPU, 7 GB RAM, 14 GB SSD shared CPU) means
# wall-clock numbers WILL have 20–50 % run-to-run variance per the
# Criterion author. Treat these numbers as relative (regression
# detection), not absolute. Headline benchmarks in
# `docs/benchmarks.md` continue to be sourced from a known dedicated
# machine.

on:
  workflow_dispatch:
    inputs:
      bench:
        description: "Bench target (Cargo `--bench <name>`, e.g. quick_div, all_functions, mul_div_candidates)"
        required: true
        default: "quick_div"
        type: string
      filter:
        description: "Optional Criterion filter (passed as the trailing argument; empty runs all groups in the bench)"
        required: false
        default: ""
        type: string
      features:
        description: "Cargo feature set"
        required: false
        default: "wide,x-wide,xx-wide,macros"
        type: string

permissions:
  contents: read

jobs:
  quick:
    name: "\U0001FA91 ${{ inputs.bench }}${{ inputs.filter && format(' [{0}]', inputs.filter) || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system libs (fontconfig for plotters dev-dep)
        # `plotters` (a dev-dep, used by examples/chart_gen.rs) pulls
        # `yeslogic-fontconfig-sys` via its `ttf` feature, which links
        # to libfontconfig at build time. Standard ubuntu-latest
        # doesn't have it pre-installed.
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache cargo build outputs
        uses: actions/cache@v5
        with:
          path: target
          key: cargo-target-${{ runner.os }}-bench-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml', 'src/**', 'macros/src/**', 'benches/**') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-bench-

      - name: Show runner specs
        # Anchor the wall-clock numbers in the artefact to the actual
        # CPU class GitHub allocated for the run. The standard runner
        # pool has multiple CPU generations and Criterion timings can
        # disagree by tens of percent across them.
        run: |
          echo "--- /proc/cpuinfo (model name + flags) ---"
          grep -E '^(model name|flags)' /proc/cpuinfo | head -8
          echo
          echo "--- nproc ---"
          nproc
          echo
          echo "--- memory ---"
          free -h

      - name: Run ${{ inputs.bench }} bench
        # Dispatched bench target. Features default to the full wide
        # surface; filter is empty by default and passes through as
        # Criterion's positional name-filter argument when supplied.
        # Filter is threaded through `$FILTER` so shell metachars
        # (parens / pipes) in a regex don't trip the bash parser.
        env:
          FILTER: ${{ inputs.filter }}
        run: cargo bench --bench ${{ inputs.bench }} --features ${{ inputs.features }} -- "$FILTER"

      - name: Upload Criterion results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: criterion-${{ inputs.bench }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: target/criterion/
          if-no-files-found: warn
          retention-days: 7
