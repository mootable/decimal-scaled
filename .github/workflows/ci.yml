name: "✅ ci (pre-merge gates)"

# Pre-merge enforcement for the release checks that were previously
# trusted-but-manual. Runs on every pull request so a broken build,
# broken docs, or a clippy regression is caught BEFORE merge — not
# discovered post-merge or at release time.
#
# Golden gating is WIDTH-SHARDED, not sampled: `golden-quick` is one
# matrix job per width tier that builds exactly that tier's release gate
# exe AND runs it in the SAME job (no artifact handoff). Each shard runs
# the FULL input surface for its own widths under the default rounding
# mode and BLOCKS; the harness asserts pass>0 so a zero-cell shard fails
# (the zero-work guard), and `fail-fast: false` keeps one tier's failure
# from masking another. This replaces the earlier single full-width
# `golden (build)` exe, which timed out at its 30-min cap on every run
# (the monolithic `--features wide,x-wide,xx-wide --test golden --no-run`
# release compile no longer fits) and so silently SKIPPED the downstream
# stripes — the per-tier width shard is the structural fix, mirroring the
# `tests-consolidated` job below and golden-comprehensive.yml. The
# six-mode sweep lives in its OWN workflow (golden-comprehensive.yml) so
# this gate's verdict never waits on it. Each shard uploads a mini report
# (results.tsv + summary) readable the moment it finishes.
#
# Gates (must pass): tests, golden-quick (per width shard), no_std, docs,
# msrv. Advisory (never fails the build): clippy.

on:
  pull_request:
  push:
    branches:
      - main
      - "release/*"

permissions:
  contents: read

concurrency:
  # Match bench-branch-compare: let the in-progress run finish (don't waste a
  # near-complete tests/golden gate), and let a newer push supersede the QUEUED
  # run only (queue-of-1).
  group: ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # GATE: the full test suite. Builds every target (lib, tests,
  # examples, benches) under the widest stable feature set, then the
  # default-feature suite. Builds-all is the point — it is what would
  # have caught the 0.4.4 example-gating breakage that per-file
  # `--test` scoping misses.
  tests:
    name: tests (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # The full-feature dev-profile compile of decimal-scale-test (the
      # rung kernels × 13 ladder widths plus the narrow Int<24> Ziv
      # machinery, all with debuginfo) OOMs the hosted runner at the
      # default parallelism — the service SIGTERMs the job (exit 143,
      # observed 2026-06-12; same class as the history.yml build fix).
      # Two parallel rustc units keep the peak inside the runner.
      CARGO_BUILD_JOBS: "2"
      # line-tables-only: full dev debuginfo is most of a test compile's
      # memory/size; line tables keep file:line backtraces usable while
      # shedding the bulk (the exit-143 memory class, proven by the
      # lib-cmp sampler: a single rustc can peak past the 16 GB runner).
      CARGO_PROFILE_DEV_DEBUG: "line-tables-only"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-tests-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-tests-${{ runner.os }}-

      - name: Install system libs (fontconfig for the plotters dev-dep)
        # The full `cargo test` builds every target including the
        # chart_gen example, which pulls plotters → yeslogic-fontconfig-sys.
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Add swap for the compile's memory peak
        # PROVEN cause (lib-cmp-precision run 27393313247, -j 1 + sampler):
        # a single rustc on a full-width monomorphised target can peak past
        # the runner's 16 GB and the service SIGTERMs the job (exit 143).
        # Disk-backed swap absorbs the short spike.
        run: |
          set -euo pipefail
          SWAP=/mnt/swapfile2
          sudo fallocate -l 12G "$SWAP" 2>/dev/null || { SWAP=/swapfile2; sudo fallocate -l 8G "$SWAP"; }
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP"
          sudo swapon "$SWAP"
          free -h

      - name: Full test suite (wide tiers + macros)
        # The full `cargo test` — no `--test` scoping — so every
        # example and bench target is compiled as part of the run.
        # The golden surface is the striped release gate below, not
        # part of this job.
        run: cargo test --features wide,x-wide,xx-wide,macros

      - name: Default-feature test suite (narrow tiers)
        # The wide-tier test files are feature-gated — file-top
        # `#![cfg(feature = ...)]` module gates plus Cargo.toml
        # `required-features` on the targets that name every tier — so
        # a plain default `cargo test` compiles and runs the narrow-tier
        # subset. This verifies the default-feature consumer surface
        # BEHAVES, not merely builds.
        run: cargo test

      # NOTE: the full-feature consolidated leg (`cargo test -p
      # decimal-scale-test --features wide,x-wide,xx-wide,macros,dyn`) lived
      # here but OOMed the runner (exit 143: one test binary monomorphising
      # all 13 widths peaked past 16 GB even with -j2 + line-tables + swap).
      # It now runs width-sharded in the `tests-consolidated` matrix job
      # below; this job keeps the default-feature consolidated leg.
      - name: Consolidated test suite (decimal-scale-test, default features)
        # Default-feature (narrow-tier) run of the migrated suite — the
        # feature passthrough exists exactly so this leg keeps covering
        # the narrow build (several historical regressions were
        # narrow-build-only).
        run: cargo test -p decimal-scale-test

  # GATE: the migrated integration suite (decimal-scale-test), WIDTH-SHARDED.
  # Replaces the single full-feature consolidated leg that OOMed the runner
  # (exit 143: one test binary monomorphising all 13 widths peaked past the
  # 16 GB runner even with -j2 + line-tables-only + swap). Each shard builds
  # exactly ONE width tier — a supported config since d4735e4c made policy
  # routing feature-independent — so no single rustc carries the whole ladder.
  # Mirrors the per-tier `--features <tier>` shard pattern in
  # golden-comprehensive.yml; the union of all shards reproduces the removed
  # leg's coverage. fail-fast off so a slow/failed tier doesn't mask others.
  tests-consolidated:
    name: tests consolidated (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      # Post-cells the heavy monomorphisation lives in the decimal-scaled-cells
      # rlib the shard links, so a single-tier build is light and runs at the
      # runner's default parallelism — the old -j2 cap was pre-cells insurance
      # against the exit-143 OOM and is no longer needed. line-tables-only
      # debuginfo stays as cheap weight-shedding insurance.
      CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shard: narrow, feat: "macros,dyn" }
          - { shard: d57,    feat: "d57,macros,dyn" }
          - { shard: d76,    feat: "d76,macros,dyn" }
          - { shard: d115,   feat: "d115,macros,dyn" }
          - { shard: d153,   feat: "d153,macros,dyn" }
          - { shard: d230,   feat: "d230,macros,dyn" }
          - { shard: d307,   feat: "d307,macros,dyn" }
          - { shard: d462,   feat: "d462,macros,dyn" }
          - { shard: d616,   feat: "d616,macros,dyn" }
          - { shard: d924,   feat: "d924,macros,dyn" }
          - { shard: d1232,  feat: "d1232,macros,dyn" }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-tests-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-tests-${{ runner.os }}-

      - name: Add swap for the compile's memory peak
        # Copied from the `tests` job: disk-backed swap absorbs the short
        # compile spike (the exit-143 memory class) as cheap insurance on top
        # of the now single-tier build.
        run: |
          set -euo pipefail
          SWAP=/mnt/swapfile2
          sudo fallocate -l 12G "$SWAP" 2>/dev/null || { SWAP=/swapfile2; sudo fallocate -l 8G "$SWAP"; }
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP"
          sudo swapon "$SWAP"
          free -h

      - name: Consolidated test suite (${{ matrix.shard }} tier)
        # `-p decimal-scale-test` scopes to the gate crate, so the root
        # crate's plotters/fontconfig bench dev-deps never compile (no system
        # libs needed). One width tier + macros,dyn per shard.
        run: cargo test -p decimal-scale-test --features ${{ matrix.feat }}

  # GATE: the quick golden surface — FULL input set, every cell, the
  # default rounding mode, WIDTH-SHARDED. One matrix job per width tier
  # builds exactly that tier's release gate exe AND runs it in the SAME
  # job (no artifact handoff) — the `tests-consolidated` shape applied to
  # the golden gate. Each shard exe also carries the always-compiled
  # D18/D38 cells, so every shard `GOLDEN_WIDTHS`-filters to its own
  # tier's widths or the narrow cells re-run in every shard. The harness
  # `check()` asserts pass>0, so a shard that selects zero cells FAILS
  # (the zero-work guard); `fail-fast: false` keeps one tier's failure
  # from masking another, so the per-shard jobs ARE the gate (no separate
  # splice job needed — a missing/failed shard is its own red job). One
  # mode only (half-to-even); the six-mode sweep stays in
  # golden-comprehensive.yml. Each shard posts its summary to the job
  # step-summary and uploads its mini report.
  golden-quick:
    name: golden quick (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # The single-tier compile is slim post-cells (the decimal-scaled-cells
      # rlib carries the heavy monomorphisation the shard links), so it runs at
      # the runner's default parallelism — the old -j2 cap was pre-cells OOM
      # insurance the width shard already made unnecessary. No swap step either,
      # for the same reason: the per-tier build does not OOM, like
      # golden-comprehensive's per-tier builds, which run swap-free. No release
      # debuginfo keeps the compile slim.
      CARGO_PROFILE_RELEASE_DEBUG: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - { shard: narrow, feat: "",      widths: "18,38" }
          - { shard: d57,    feat: "d57",   widths: "57"    }
          - { shard: d76,    feat: "d76",   widths: "76"    }
          - { shard: d115,   feat: "d115",  widths: "115"   }
          - { shard: d153,   feat: "d153",  widths: "153"   }
          - { shard: d230,   feat: "d230",  widths: "230"   }
          - { shard: d307,   feat: "d307",  widths: "307"   }
          - { shard: d462,   feat: "d462",  widths: "462"   }
          - { shard: d616,   feat: "d616",  widths: "616"   }
          - { shard: d924,   feat: "d924",  widths: "924"   }
          - { shard: d1232,  feat: "d1232", widths: "1232"  }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-golden-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-golden-${{ runner.os }}-

      - name: Build + run the quick golden shard (default mode, this tier's widths)
        # `-p decimal-scale-test` scopes the build to the gate crate (the
        # root crate's plotters/fontconfig bench dev-deps never compile, so
        # no system libs). Build + run in ONE invocation: compile this
        # tier's golden exe, then run golden_default (default half-to-even)
        # over only this tier's widths. `${FEAT:+...}` drops --features
        # entirely for the narrow shard (the base D18/D38 build).
        env:
          GOLDEN_WIDTHS: "${{ matrix.widths }}"
          GOLDEN_REPORT_DIR: shard-report
          GOLDEN_DIR: ${{ github.workspace }}/decimal-scaled-golden/golden
        run: |
          set -euo pipefail
          FEAT="${{ matrix.feat }}"
          cargo test -p decimal-scale-test --release ${FEAT:+--features "$FEAT"} --test golden golden_default -- --ignored --nocapture

      - name: Mini report → log + step summary
        if: always()
        run: |
          if [ -f shard-report/summary.txt ]; then
            echo "=== ${{ matrix.shard }} mini report ==="
            cat shard-report/summary.txt
            cat shard-report/summary.txt >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no shard-report/summary.txt was produced (the gate exited before reporting)"
          fi

      - name: Upload shard mini report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: golden-quick-${{ matrix.shard }}
          path: shard-report/
          if-no-files-found: warn
          retention-days: 7

  # GATE: the no_std + alloc build. The crate is `#![no_std]` under
  # non-default features, but no workflow exercised that build, so a
  # missing-import regression (bare `Vec` / `vec!` / std-only f64
  # intrinsics in the integer + algo layers) compiled cleanly under
  # `std` and only broke `no_std` consumers. This job is the real gate:
  # a plain library `cargo check` with `default-features` off and the
  # wide tiers on. No fontconfig — no examples or benches are built.
  no_std:
    name: no_std (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-nostd-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-nostd-${{ runner.os }}-

      - name: no_std + alloc lib check (wide tiers + macros)
        # `--no-default-features` drops `std`, leaving the `#![no_std]`
        # path with the `alloc` base. Lib-only `cargo check` (no
        # examples/benches), so no system libs are required.
        run: cargo check --no-default-features --features alloc,wide,x-wide,xx-wide,macros

  # GATE: rustdoc with warnings-as-errors. Catches broken intra-doc
  # links before merge; docs.yml only runs this post-merge on `main`.
  docs:
    name: docs (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-docs-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-docs-${{ runner.os }}-

      - name: Build rustdoc (-D warnings)
        # `--no-deps` documents only this crate, so plotters (a
        # dev-dependency) is not compiled and no fontconfig system
        # lib is required. RUSTDOCFLAGS=-D warnings fails on any
        # broken intra-doc link.
        run: cargo doc --no-deps --features wide,x-wide,xx-wide,macros
        env:
          RUSTDOCFLAGS: "-D warnings"

  # GATE: the MSRV. Until this job nothing built with a pinned-old
  # toolchain — the other jobs all run `dtolnay/rust-toolchain@stable`,
  # so a newer-stdlib call or language feature passed CI green and only
  # broke consumers holding the documented MSRV. That had already
  # happened: the manifests declared `rust-version = "1.85"`, but the
  # lib needs let-chains (stable since 1.88) and `_`-inferred const
  # generic arguments as in `dispatch::<_, SCALE>` (stable since 1.89).
  # 1.89 is the measured floor (1.88 fails, 1.89 builds both feature
  # sets), so this job pins 1.89 and the manifests' `rust-version`
  # must match it. `cargo check` (not `cargo test`) keeps the job
  # cheap: type-checking the lib is what catches MSRV drift; behaviour
  # is covered by the stable-toolchain gates above.
  msrv:
    name: msrv (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain (MSRV 1.89)
        uses: dtolnay/rust-toolchain@1.89

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-msrv-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-msrv-${{ runner.os }}-

      - name: MSRV lib check (wide tiers + macros)
        # Lib-only `cargo check` (no examples/benches), so no system
        # libs are required and the job stays minutes-cheap.
        run: cargo check --features wide,x-wide,xx-wide,macros

      - name: MSRV lib check (default features)
        run: cargo check

  # INFORMATIONAL: clippy on the lib. The lib currently emits ~214
  # pre-existing macro-generated warnings, so a `-D warnings` clippy
  # gate would red-fail every PR. Run it without `-D warnings` and
  # never fail the build (continue-on-error).
  #
  # TODO(0.5.0): drive clippy warnings to zero, then promote to a gate
  # (add `-- -D warnings` and drop continue-on-error).
  clippy:
    name: clippy (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-clippy-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-clippy-${{ runner.os }}-

      - name: Clippy (lib, informational — no -D warnings)
        run: cargo clippy --lib --features wide,x-wide,xx-wide,macros
