name: "✅ ci (pre-merge gates)"

# Pre-merge enforcement for the release checks that were previously
# trusted-but-manual. Runs on every pull request so a broken build,
# broken docs, or a clippy regression is caught BEFORE merge — not
# discovered post-merge or at release time.
#
# Why this exists alongside precision.yml / docs.yml:
#   * precision.yml runs only the precision-specific `--test` files,
#     so it never compiles the example/bench targets. The 0.4.4
#     example-gating breakage (`karabench` / `profile_*` examples
#     failing to build under the wrong feature set) was therefore
#     invisible to CI. A FULL `cargo test` build — which compiles
#     every target — would have caught it. This workflow runs that.
#   * docs.yml only runs on push to `main`, i.e. AFTER merge. Broken
#     intra-doc links thus reach `main` before anyone notices. This
#     workflow runs the same `-D warnings` doc build pre-merge.
#
# Gates (must pass): tests, no_std, docs.
# Informational (never fails the build): clippy.

on:
  pull_request:
  push:
    branches:
      - main
      - "release/*"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # GATE: the full test suite. Builds every target (lib, tests,
  # examples, benches) under the widest stable feature set, then the
  # default-feature suite. Builds-all is the point — it is what would
  # have caught the 0.4.4 example-gating breakage that precision.yml's
  # per-file `--test` scope misses.
  tests:
    name: tests (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-tests-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-tests-${{ runner.os }}-

      - name: Install system libs (fontconfig for the plotters dev-dep)
        # The full `cargo test` builds every target including the
        # chart_gen example, which pulls plotters → yeslogic-fontconfig-sys.
        run: sudo apt-get update && sudo apt-get install -y libfontconfig1-dev pkg-config

      - name: Full test suite (wide tiers + macros)
        # The full `cargo test` — no `--test` scoping — so every
        # example and bench target is compiled as part of the run.
        run: cargo test --features wide,x-wide,xx-wide,macros

      - name: Default-feature build check
        # The crate's tests are feature-on — most exercise the wide
        # tiers (D57…D1232, gated behind wide/x-wide/xx-wide), so they
        # don't compile under default features. Verify the default
        # *lib* builds rather than run the wide-tier tests with the
        # wrong feature set; the full-feature test gate above covers
        # behaviour. (TODO(0.5.0): gate the wide-tier test files so a
        # default `cargo test` can run the narrow-tier subset.)
        run: cargo check

  # GATE: the no_std + alloc build. The crate is `#![no_std]` under
  # non-default features, but no workflow exercised that build, so a
  # missing-import regression (bare `Vec` / `vec!` / std-only f64
  # intrinsics in the integer + algo layers) compiled cleanly under
  # `std` and only broke `no_std` consumers. This job is the real gate:
  # a plain library `cargo check` with `default-features` off and the
  # wide tiers on. No fontconfig — no examples or benches are built.
  no_std:
    name: no_std (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-nostd-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-nostd-${{ runner.os }}-

      - name: no_std + alloc lib check (wide tiers + macros)
        # `--no-default-features` drops `std`, leaving the `#![no_std]`
        # path with the `alloc` base. Lib-only `cargo check` (no
        # examples/benches), so no system libs are required.
        run: cargo check --no-default-features --features alloc,wide,x-wide,xx-wide,macros

  # GATE: rustdoc with warnings-as-errors. Catches broken intra-doc
  # links before merge; docs.yml only runs this post-merge on `main`.
  docs:
    name: docs (gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-docs-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-docs-${{ runner.os }}-

      - name: Build rustdoc (-D warnings)
        # `--no-deps` documents only this crate, so plotters (a
        # dev-dependency) is not compiled and no fontconfig system
        # lib is required. RUSTDOCFLAGS=-D warnings fails on any
        # broken intra-doc link.
        run: cargo doc --no-deps --features wide,x-wide,xx-wide,macros
        env:
          RUSTDOCFLAGS: "-D warnings"

  # INFORMATIONAL: clippy on the lib. The lib currently emits ~214
  # pre-existing macro-generated warnings, so a `-D warnings` clippy
  # gate would red-fail every PR. Run it without `-D warnings` and
  # never fail the build (continue-on-error).
  #
  # TODO(0.5.0): drive clippy warnings to zero, then promote to a gate
  # (add `-- -D warnings` and drop continue-on-error).
  clippy:
    name: clippy (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + git
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-ci-clippy-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'macros/Cargo.toml') }}
          restore-keys: |
            cargo-ci-clippy-${{ runner.os }}-

      - name: Clippy (lib, informational — no -D warnings)
        run: cargo clippy --lib --features wide,x-wide,xx-wide,macros
