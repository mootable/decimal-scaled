name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard supply-chain security analysis. Results
# are published to the GitHub Security tab (code scanning alerts) and
# to the public Scorecard API, which backs the badge on README.
#
# Triggers:
#   * push to `main` — keeps the published score current with the
#     branch protection, signed-tag, and workflow-permission state
#     visible on HEAD;
#   * weekly cron (Monday 06:23 UTC, off-minute to avoid the top-of-
#     the-hour rush on GitHub Actions runners);
#   * manual dispatch.

on:
  push:
    branches:
      - main
  schedule:
    - cron: "23 6 * * 1"
  workflow_dispatch:

# `id-token: write` is required for publishing results to the public
# Scorecard API (sigstore-signed attestations). `security-events:
# write` lets the action upload SARIF to the Security tab. `contents:
# read` is the default minimum.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@2d1146689b8cda280b9bc96326124645441f03bc # v2.4.4
        with:
          results_file: results.sarif
          results_format: sarif
          # `publish_results: true` posts the score to the public
          # Scorecard API so the README badge can read it. Only fires
          # on push to the default branch and on the scheduled cron;
          # forks and PRs are skipped automatically.
          publish_results: true
          # PAT so the Branch-Protection check can read the branch
          # protection config — the default GITHUB_TOKEN cannot, which
          # caps that check's score. Create SCORECARD_TOKEN as a
          # fine-grained PAT on this repo with Administration: read-only
          # + Contents: read-only (Metadata: read-only is implied).
          repo_token: ${{ secrets.SCORECARD_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          sarif_file: results.sarif
