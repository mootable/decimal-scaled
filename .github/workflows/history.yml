name: "🕰 history gates (advisory)"

# The version-history correctness gates (task 10.13): the live crate beside
# the pinned historical releases (ds-044, ds-033) over the same golden set.
# `history_previous` carries the RATCHET assertion (no cell that passed in
# 0.4.4 may fail live); `history_all` is the cross-version shootout report
# with per-function timing medians (reported, never asserted).
#
# Own workflow, ADVISORY, like golden-comprehensive: the pinned historical
# crates are heavy per-tier-era compiles the quick ci.yml gate must never
# pay, and a red ratchet means roll back / bisect, not block the merge loop.
#
# WIDTH-SHARDED build+run (the ci.yml golden-quick / tests-consolidated
# pattern): one matrix job per width tier builds exactly that tier's release
# gate exe AND runs it in the SAME job (no artifact handoff), then
# `GOLDEN_WIDTHS`-filters the run to its own tier's widths. The earlier
# design compiled ONE monolithic `--features wide,x-wide,xx-wide,history`
# binary (the full live + ds-044 + ds-033 cell fan-out in one rustc) and
# fanned the run out over row stripes — that build exhausted the runner's
# 16 GB + 12 GB swap and the service SIGTERMed it (exit 143, run
# 27447768863). Sharding the LIVE (per-tier `cfg`-gated) cell fan-out down to
# a single tier per job is the structural fix, the same one golden-quick made
# for the golden gate.
#
# NOTE — heavier than a golden-quick shard: unlike the golden gate, each
# history shard also pulls the pinned historical crates (ds-044 always;
# ds-033 on the shards whose widths 0.3.3 adapts) AND the v044/v033 adapter
# cell fan-out, which is NOT tier-`cfg`-gated (it instantiates its whole
# ladder whenever its `history-*` feature is on — only the LIVE fan-out
# narrows per tier). The first green run validated ~1.5 GB peak per shard,
# well inside the runner's 16 GB; the disk-backed swap and CARGO_BUILD_JOBS
# parallelism cap have been removed. The resource sampler is retained as
# cheap evidence should a future change spike memory again.

on:
  push:
    branches:
      - main
      - "release/*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  # Serial queue per ref, like ci.yml/bbc: a queued run waits its turn for the
  # in-progress run to finish (deferred, never cancelled).
  group: history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  history:
    name: history (${{ matrix.shard }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      # Drop the workspace's `[profile.release] debug = true` (local samply
      # symbolization) — pure build-time/memory weight this gate never needs.
      CARGO_PROFILE_RELEASE_DEBUG: "false"
    strategy:
      # One slow/failed tier must not mask the others — each shard IS the gate
      # for its own widths (a missing/red shard is its own red job).
      fail-fast: false
      matrix:
        # `feat`: this shard's live tier + the historical features. `history-044`
        # rides every shard (the ratchet needs the 0.4.4 subject at every
        # width). `history-033` rides only the shards whose widths 0.3.3 adapts
        # (18/38/76/153/230/307) — elsewhere the `history_all` 0.3.3 column is
        # simply absent (its `#[cfg(feature = "history-033")]` block compiles
        # out), which the gate handles gracefully. `widths`: the GOLDEN_WIDTHS
        # this shard sweeps; the union is the full surface (narrow carries the
        # always-compiled D18/D38 cells, so it needs no tier feature).
        include:
          - { shard: narrow, feat: "history-044,history-033",      widths: "18,38" }
          - { shard: d57,    feat: "d57,history-044",              widths: "57"    }
          - { shard: d76,    feat: "d76,history-044,history-033",   widths: "76"    }
          - { shard: d115,   feat: "d115,history-044",             widths: "115"   }
          - { shard: d153,   feat: "d153,history-044,history-033",  widths: "153"   }
          - { shard: d230,   feat: "d230,history-044,history-033",  widths: "230"   }
          - { shard: d307,   feat: "d307,history-044,history-033",  widths: "307"   }
          - { shard: d462,   feat: "d462,history-044",             widths: "462"   }
          - { shard: d616,   feat: "d616,history-044",             widths: "616"   }
          - { shard: d924,   feat: "d924,history-044",             widths: "924"   }
          - { shard: d1232,  feat: "d1232,history-044",            widths: "1232"  }

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + git
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-history-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'decimal-scale-test/Cargo.toml') }}
          restore-keys: |
            cargo-history-${{ runner.os }}-

      - name: Build + run the history shard (ratchet + shootout, this tier's widths)
        # Build + run in ONE invocation (golden-quick's no-artifact-handoff
        # shape): compile this tier's history exe, then run both gates over only
        # this tier's widths. The two gates serialise THEMSELVES via the in-test
        # `HOOK_GUARD` mutex (each holds it for its whole run while it swaps the
        # process-global panic hook), so their ride-along timing medians can't
        # overlap regardless of the test-runner thread count — no `--test-threads`
        # cap needed. `--ignored` runs the two `#[ignore]`d gates; `--nocapture`
        # streams the per-cell progress.
        # The awk pipe timestamps every line (slow-vs-stuck is decidable from the
        # live log) and `tee` stages the log for upload. The resource sampler
        # prints memory + disk beside the compile so a returning spike leaves an
        # evidence curve rather than a bare exit 143.
        env:
          GOLDEN_WIDTHS: "${{ matrix.widths }}"
          GOLDEN_DIR: ${{ github.workspace }}/decimal-scaled-golden/golden
        run: |
          set -euo pipefail
          ( while true; do m=$(free -m | awk '/^Mem:/{print $7}'); s=$(free -m | awk '/^Swap:/{print $4}'); d=$(df -BM --output=avail . | tail -1 | tr -dc 0-9); echo "[res $(date +%H:%M:%S)] mem avail ${m} MB | swap free ${s} MB | disk avail ${d} MB"; sleep 15; done ) &
          SAMPLER=$!
          trap 'kill "$SAMPLER" 2>/dev/null || true' EXIT
          cargo test -p decimal-scale-test --release --features "${{ matrix.feat }}" --test history \
            -- --ignored --nocapture 2>&1 \
            | awk '{ print strftime("[%H:%M:%S]"), $0; fflush() }' \
            | tee "history-${{ matrix.shard }}.log"

      - name: Upload the shard log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: history-${{ matrix.shard }}
          path: history-${{ matrix.shard }}.log
          if-no-files-found: warn
          retention-days: 7
