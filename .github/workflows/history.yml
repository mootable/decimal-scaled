name: "🕰 history gates (advisory)"

# The version-history correctness gates (task 10.13): the live crate beside
# the pinned historical releases (ds-044, ds-033) over the same golden set.
# `history_previous` carries the RATCHET assertion (no cell that passed in
# 0.4.4 may fail live); `history_all` is the cross-version shootout report
# with per-function timing medians (reported, never asserted).
#
# Own workflow, ADVISORY, like golden-comprehensive: the pinned historical
# crates are heavy per-tier-era compiles the quick ci.yml gate must never
# pay, and a red ratchet means roll back / bisect, not block the merge loop.
#
# Compile ONCE, then fan out (the golden-quick/bbc pattern): the build job
# compiles the history test exe and stages JUST the binary; each stripe
# downloads it and runs its `GOLDEN_STRIPE=k/n` row partition directly —
# no per-stripe recompile of the heavy historical crates.

on:
  push:
    branches:
      - main
      - "release/*"
  workflow_dispatch:

permissions:
  contents: read

env:
  STRIPE_COUNT: "20"

concurrency:
  # Serial queue per ref, like ci.yml/bbc: an in-progress run finishes, a
  # newer push supersedes only the QUEUED run.
  group: history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  plan:
    name: plan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      stripes: ${{ steps.gen.outputs.stripes }}
    steps:
      - name: Generate stripe indices
        id: gen
        run: echo "stripes=$(python3 -c "import json, os; print(json.dumps(list(range(int(os.environ['STRIPE_COUNT'])))))")" >> "$GITHUB_OUTPUT"

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-history-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'decimal-scale-test/Cargo.toml') }}
          restore-keys: |
            cargo-history-${{ runner.os }}-

      - name: Add swap for the compile's memory peak
        # PROVEN cause (lib-cmp-precision run 27393313247, -j 1 + sampler):
        # one rustc compiling a full-width monomorphised gate binary peaks
        # past the runner's 16 GB and the service SIGTERMs it (exit 143).
        # This job compiles THREE full-width crates (live + ds-044 + ds-033)
        # into one binary — the heaviest of the class. Swap absorbs the spike.
        run: |
          set -euo pipefail
          SWAP=/mnt/swapfile2
          sudo fallocate -l 12G "$SWAP" 2>/dev/null || { SWAP=/swapfile2; sudo fallocate -l 8G "$SWAP"; }
          sudo chmod 600 "$SWAP"
          sudo mkswap "$SWAP"
          sudo swapon "$SWAP"
          free -h

      - name: Compile the history gates (release, no run)
        # Full parallelism — the -j1 era is over. Post-cells, the heavy
        # band-edge + history-adapter monomorphisation lives in ONE
        # decimal-scaled-cells rlib that the history test binary LINKS rather
        # than re-instantiates, so this compile no longer fans the per-tier-era
        # ds-044/ds-033 widths out across many parallel rustc units the way the
        # pre-cells build did. That fan-out was what peaked past the runner's
        # 16 GB and let the service SIGTERM the job (exit 143, the lib-cmp /
        # golden-comprehensive class) — the cap was the mitigation for it, and
        # with the rlib carrying the monomorphisation it is no longer needed, so
        # the build runs at the runner's default parallelism. The cargo cache
        # keeps the wall inside the timeout. CARGO_PROFILE_RELEASE_DEBUG still
        # drops the workspace's `[profile.release] debug = true` (local samply
        # symbolization) — pure build-time/memory weight this gate never needs.
        env:
          CARGO_PROFILE_RELEASE_DEBUG: "false"
        # The resource sampler prints memory + disk beside the compile as cheap
        # insurance for this first post-cells validation run: if the spike ever
        # returns it leaves an evidence curve rather than a bare exit 143.
        run: |
          set -euo pipefail
          ( while true; do m=$(free -m | awk '/^Mem:/{print $7}'); s=$(free -m | awk '/^Swap:/{print $4}'); d=$(df -BM --output=avail . | tail -1 | tr -dc 0-9); echo "[res $(date +%H:%M:%S)] mem avail ${m} MB | swap free ${s} MB | disk avail ${d} MB"; sleep 15; done ) &
          SAMPLER=$!
          cargo test -p decimal-scale-test --release --features wide,x-wide,xx-wide,history --test history --no-run
          kill "$SAMPLER" || true

      - name: Stage the gate exe
        run: |
          set -euo pipefail
          exe=$(ls -t target/release/deps/history-* | grep -v '\.d$' | head -1)
          mkdir -p staged
          cp "$exe" staged/history
          chmod +x staged/history
          echo "staged: $exe"

      - name: Upload the gate exe
        uses: actions/upload-artifact@v7
        with:
          name: history-exe
          path: staged/
          if-no-files-found: error
          retention-days: 3

  history:
    name: history (stripe ${{ matrix.stripe }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: [plan, build]
    strategy:
      fail-fast: false
      matrix:
        stripe: ${{ fromJSON(needs.plan.outputs.stripes) }}
    steps:
      - name: Checkout (golden data)
        uses: actions/checkout@v6

      - name: Download the gate exe
        uses: actions/download-artifact@v8
        with:
          name: history-exe

      - name: Run stripe (ratchet + shootout)
        env:
          GOLDEN_STRIPE: "${{ matrix.stripe }}/${{ env.STRIPE_COUNT }}"
          GOLDEN_DIR: ${{ github.workspace }}/decimal-scaled-golden/golden
        # --test-threads=1: the two gates report per-function timing
        # medians as a ride-along; running them concurrently on the
        # 2-core runner would corrupt each other's medians.
        # The awk pipe timestamps every line (slow-vs-stuck is decidable
        # from the live log); --nocapture streams the harness's per-cell
        # progress lines as they happen.
        run: |
          set -euo pipefail
          chmod +x history
          ./history --ignored --nocapture --test-threads=1 2>&1 \
            | awk '{ print strftime("[%H:%M:%S]"), $0; fflush() }'
          exit "${PIPESTATUS[0]}"
