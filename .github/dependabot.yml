version: 2

# Dependabot configuration for decimal-scaled.
#
# Two cargo ecosystems are tracked because each Cargo.toml lives in
# its own root (the root crate and the `macros/` proc-macro crate).
#
# All schedules are Monday morning UTC, off-minute, to spread PR
# creation across the week's start without colliding with the security
# cron jobs.

updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:17"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot

  - package-ecosystem: cargo
    directory: "/macros"
    schedule:
      interval: weekly
      day: monday
      time: "09:23"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:35"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - dependabot
      - github-actions
