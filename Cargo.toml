[package]
name = "decimal-scaled"
version = "0.1.1"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic scaled fixed-point decimal types for deterministic arithmetic. Multiply / divide use a 256-bit widening intermediate with the Moller-Granlund 2011 magic-number divide algorithm (adapted from ConstScaleFpdec, MIT-licensed; see LICENSE-THIRD-PARTY)."
repository = "https://github.com/mootable/decimal-scaled"
documentation = "https://docs.rs/decimal-scaled/"
readme = "README.md"
keywords = ["decimal", "deterministic", "no_std", "fixed", "precision"]
categories = ["mathematics", "no-std", "science", "finance"]

[features]
# `strict` is on by default — the crate's headline feature is the
# correctly-rounded (0.5 ULP) integer-only transcendentals. To opt
# in to the faster f64-bridge ("fast") path instead, build with
# `default-features = false, features = ["std", "serde"]` and the
# plain `ln` / `exp` / `sin` / … methods will dispatch through f64
# (giving ≈ 16 decimal digits of platform-libm precision rather
# than 0.5 ULP).
default = ["std", "serde", "strict"]
std = ["alloc"]
alloc = []
serde = ["dep:serde"]
macros = ["dep:decimal_scaled_macros"]
# Routes every transcendental through the integer-only correctly-
# rounded path. On by default (see `default` above). Drops the
# `f64`-bridge transcendentals to keep the build small; explicit
# float-conversion methods (`to_f64`, `from_f64`, …)
# stay available regardless. Strict mode does not require `std`;
# the integer-only transcendentals compile under `no_std + alloc`.
strict = []
# Drops the integer-only `*_strict` transcendental surface entirely
# for a smaller build. `fast` overrides `strict`: when both
# are set the crate behaves as if neither were — the f64-bridge
# (fast) transcendentals are used (when `std` is available) and no
# `*_strict` methods are emitted.
fast = []
# Compiles BOTH the macro-default and the per-type override
# implementations for every method that has them. Default builds compile
# only the chosen winner (see OVERRIDE_POLICY.md). With `bench-alt` on
# benchmarks can call `*_strict_default` and `*_strict_override` side by
# side without recompiling. Off by default — adds build time and binary
# size for no runtime benefit unless you're benching.
bench-alt = []
# Compile-time selector for the default RoundingMode used by the
# no-arg `rescale` family (and any future default-rounding methods).
# If none of these is enabled, the default is HalfToEven (IEEE-754
# default; banker's rounding). Mutually exclusive in intent — if more
# than one is enabled, the priority order in `src/rounding.rs` picks
# canonically.
rounding-half-away-from-zero = []
rounding-half-toward-zero = []
rounding-trunc = []
rounding-floor = []
rounding-ceiling = []
# Nightly-only: expose `from_f16` / `to_f16` /
# `from_f128` / `to_f128` on each decimal type. f16 and
# f128 are experimental in Rust; this feature requires the nightly
# toolchain. On stable, leave the feature off.
experimental-floats = []
# Wide decimal tiers. Each width is independently opt-in; `wide` is the
# umbrella up to D307, `x-wide` is the umbrella for the very wide
# (`d462` and above) tiers. They are backed by the in-tree hand-rolled
# wide-integer types — no external big-integer dependency. D9 / D18 /
# D38 use primitive storage and need none of this.
#
# Powers of two: D76, D153, D307 (wide); D616, D1232 (x-wide).
# Halfway widths `(2^n + 2^(n+1))/2`: D115, D230 (wide); D462, D924
# (x-wide). Halfway widths under 384 are skipped — they would require
# u64-aligned storage, breaking the u128-limb model.
wide = ["d76", "d115", "d153", "d230"]
d76 = []
d115 = []
d153 = []
d230 = []
# Very wide tiers (D307 and above). Gated separately because their
# strict-transcendental work integers run into many thousands of bits
# and pull in large wide-integer types.
x-wide = ["d307", "d462", "d616", "d924", "d1232"]
d307 = []
d462 = []
d616 = []
d924 = []
d1232 = []

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
num-traits = { version = "0.2", default-features = false }
decimal_scaled_macros = { path = "macros", default-features = false, optional = true }

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support", "html_reports"] }
i256 = { version = "0.2", default-features = false }
serde_json = "1"
postcard = { version = "1", default-features = false, features = ["alloc"] }
decimal_scaled_macros = { path = "macros" }
# Benchmark-only baselines for the backend comparisons (see benches/).
# None of these are normal dependencies.
bnum = { version = "0.14", default-features = false }
ruint = { version = "1", default-features = false }
rust_decimal = { version = "1", default-features = false, features = ["maths"] }
fixed = "1"

[[bench]]
name = "mul_div_candidates"
harness = false

[[bench]]
name = "all_functions"
harness = false

# Wide-integer backend comparison: native hand-rolled `Int256` vs
# `bnum` / `ruint`. Needs the wide tier.
[[bench]]
name = "wide_int_backends"
harness = false
required-features = ["wide"]

# Decimal / fixed-point backend comparison: native `D38` / `D76` vs
# `bnum`-backed `D76`, `rust_decimal`, and `fixed` — arithmetic and
# transcendentals (including the fast vs strict variants). Needs the
# wide tier.
[[bench]]
name = "decimal_backends"
harness = false
required-features = ["wide"]

# D38 mul / div: native Moller-Granlund path vs the wide-arm
# (Int256-widening) algorithm head-to-head.
[[bench]]
name = "d_w128_mul_div_paths"
harness = false
required-features = ["wide"]

# AGM vs artanh / Taylor strict transcendentals at the deepest tier
# (D307<300>). Tracks the AGM path's throughput so a future bench-
# driven promotion has a data point.
[[bench]]
name = "agm_vs_taylor"
harness = false
required-features = ["x-wide"]

# Comprehensive matrix: every decimal width × three scales (smallest /
# midpoint / largest) × arithmetic + strict + fast transcendentals,
# plus cross-crate baselines. Drives the `docs/benchmarks.md` rewrite.
[[bench]]
name = "full_matrix"
harness = false
required-features = ["wide", "x-wide"]

[lints.rust]
unused_variables = "allow"
dead_code = "allow"

[workspace]
members = [
    ".",
    "./macros",
]
resolver = "3"