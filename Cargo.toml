[package]
name = "decimal-scaled"
version = "0.1.1"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Generic scaled fixed-point decimal types for deterministic arithmetic. Multiply / divide use a 256-bit widening intermediate with the Moller-Granlund 2011 magic-number divide algorithm (adapted from ConstScaleFpdec, MIT-licensed; see LICENSE-THIRD-PARTY)."
repository = "https://github.com/mootable/decimal-scaled"
documentation = "https://docs.rs/decimal-scaled/"
readme = "README.md"
keywords = ["decimal", "deterministic", "no_std", "fixed", "precision"]
categories = ["mathematics", "no-std", "science", "finance"]

[features]
default = ["std", "serde"]
std = ["alloc"]
alloc = []
serde = ["dep:serde"]
macros = ["dep:decimal_scaled_macros"]
# When enabled, only integer-only (strict) implementations of transcendental
# functions (trig, log, exp, sqrt, cbrt, powf, hypot) are compiled.
# Float-to-decimal and decimal-to-float conversion methods are not compiled.
# Strict mode does not require `std`; transcendental methods compile under
# `no_std + alloc` using integer algorithms.
strict = []
# Drops the integer-only `*_strict` transcendental surface entirely for
# a smaller build. `no_strict` overrides `strict`: when both are set the
# crate behaves as if neither were — the f64-bridge transcendentals are
# used (when `std` is available) and no `*_strict` methods are emitted.
no_strict = []
# Compile-time selector for the default RoundingMode used by the
# no-arg `rescale` family (and any future default-rounding methods).
# If none of these is enabled, the default is HalfToEven (IEEE-754
# default; banker's rounding). Mutually exclusive in intent — if more
# than one is enabled, the priority order in `src/rounding.rs` picks
# canonically.
rounding-half-away-from-zero = []
rounding-half-toward-zero = []
rounding-trunc = []
rounding-floor = []
rounding-ceiling = []
# Nightly-only: expose `from_f16_lossy` / `to_f16_lossy` /
# `from_f128_lossy` / `to_f128_lossy` on each decimal type. f16 and
# f128 are experimental in Rust; this feature requires the nightly
# toolchain. On stable, leave the feature off.
experimental-floats = []
# Wide decimal tiers. Each width is independently opt-in; `wide` is the
# umbrella up to D1024, `x-wide` is the umbrella for the very wide
# (`d1536` and above) tiers. They are backed by the in-tree hand-rolled
# wide-integer types — no external big-integer dependency. D32 / D64 /
# D128 use primitive storage and need none of this.
#
# Powers of two: D256, D512, D1024 (wide); D2048, D4096 (x-wide).
# Halfway widths `(2^n + 2^(n+1))/2`: D384, D768 (wide); D1536, D3072
# (x-wide). Halfway widths under 384 are skipped — they would require
# u64-aligned storage, breaking the u128-limb model.
wide = ["d256", "d384", "d512", "d768"]
d256 = []
d384 = []
d512 = []
d768 = []
# Very wide tiers (D1024 and above). Gated separately because their
# strict-transcendental work integers run into many thousands of bits
# and pull in large wide-integer types.
x-wide = ["d1024", "d1536", "d2048", "d3072", "d4096"]
d1024 = []
d1536 = []
d2048 = []
d3072 = []
d4096 = []

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
num-traits = { version = "0.2", default-features = false }
decimal_scaled_macros = { path = "macros", default-features = false, optional = true }

[dev-dependencies]
criterion = { version = "0.8", default-features = false, features = ["cargo_bench_support", "html_reports"] }
i256 = { version = "0.2", default-features = false }
serde_json = "1"
postcard = { version = "1", default-features = false, features = ["alloc"] }
decimal_scaled_macros = { path = "macros" }
# Benchmark-only baselines for the backend comparisons (see benches/).
# None of these are normal dependencies.
bnum = { version = "0.14", default-features = false }
ruint = { version = "1", default-features = false }
rust_decimal = { version = "1", default-features = false, features = ["maths"] }
fixed = "1"

[[bench]]
name = "mul_div_candidates"
harness = false

[[bench]]
name = "all_functions"
harness = false

# Wide-integer backend comparison: native hand-rolled `Int256` vs
# `bnum` / `ruint`. Needs the wide tier.
[[bench]]
name = "wide_int_backends"
harness = false
required-features = ["wide"]

# Decimal / fixed-point backend comparison: native `D128` / `D256` vs
# `bnum`-backed `D256`, `rust_decimal`, and `fixed` — arithmetic and
# transcendentals (including the lossy vs strict variants). Needs the
# wide tier.
[[bench]]
name = "decimal_backends"
harness = false
required-features = ["wide"]

# D128 mul / div: native Moller-Granlund path vs the wide-arm
# (Int256-widening) algorithm head-to-head.
[[bench]]
name = "d128_mul_div_paths"
harness = false
required-features = ["wide"]

[lints.rust]
unused_variables = "allow"
dead_code = "allow"

[workspace]
members = [
    ".",
    "./macros",
]
resolver = "3"