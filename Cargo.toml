[package]
name = "decimal-scaled"
version = "0.5.0"
edition = "2024"
rust-version = "1.85"
license = "MIT OR Apache-2.0"
description = "Const-generic base-10 fixed-point decimals (D18/D38/D76/D153/D307 and the half-width tiers up to D1232) with integer-only transcendentals correctly rounded to within 0.5 ULP — exact at the type's last representable place. Deterministic across every platform; no_std-friendly."
repository = "https://github.com/mootable/decimal-scaled"
homepage = "https://github.com/mootable/decimal-scaled"
documentation = "https://mootable.github.io/decimal-scaled/"
readme = "README.md"
keywords = ["decimal", "fixed-point", "deterministic", "no-std", "precision"]
categories = ["mathematics", "no-std", "science", "finance"]
exclude = [
    ".github/",
    "bash.exe.stackdump",
    "research/",
    "tarpaulin.toml",
    "scripts/",
    "docs/benchmarks*.draft",
]

# docs.rs renders the doc build with whichever features are enabled
# here, not the crate's default-feature set. Turning on the wide
# tiers, the macros, and serde means every public type and macro
# (D18/D38/D76/D153/D307, all `dNN!` proc-macros, `serde_helpers`)
# is visible on the rendered page. Experimental-floats and the
# mutually-exclusive `rounding-*` flags are deliberately omitted so
# the docs build doesn't require nightly or pick a non-default
# rounding mode.
[package.metadata.docs.rs]
features = ["std", "serde", "strict", "macros", "wide", "x-wide", "xx-wide", "dyn"]
rustdoc-args = ["--cfg", "docsrs"]

[features]
# `strict` is on by default. The crate's headline feature is the
# correctly-rounded (<=0.5 ULP) integer-only transcendentals;
# plain `ln` / `sin` / `sqrt` / etc. dispatch to that path.
#
# Strict is ALSO the dispatch when no feature is set at all; the
# explicit `strict` feature mostly signals intent and survives a
# transitive `fast` flip from a downstream crate (which still
# resolves to strict — strict wins when both are present).
#
# To opt out and use the f64 bridge instead you have to take all
# three steps: (a) `default-features = false`, (b) explicitly add
# `fast` + `std`, and (c) NOT re-add `strict`:
#   decimal-scaled = { version = "0.5.0", default-features = false,
#                      features = ["std", "serde", "fast"] }
# That gives ~16 decimal digits of platform-libm precision rather
# than the deterministic 0.5 ULP strict path.
default = ["std", "serde", "strict", "exact-scratch"]
std = ["alloc"]
alloc = []
serde = ["dep:serde"]
macros = ["dep:decimal_scaled_macros"]
# Marks the build as on the strict path: plain `sin` / `ln` / etc.
# dispatch to the integer-only, <=0.5 ULP, platform-deterministic
# `*_strict` methods. On by default. Does NOT require `std` — the
# integer-only transcendentals compile under `no_std`.
strict = []
# Runtime-polymorphic façade. Adds the `DynDecimal` object-safe trait
# and `DecimalWidth` enum, with a blanket impl bridging every concrete
# `Dxx<S>` type. Off by default — typed `Decimal` users pay nothing.
# Boxing cost (heap allocation per binary op) is the price of erasure,
# so the façade pulls in `alloc` (its `Box`/`String` returns are the
# crate's only sanctioned heap path; the typed `Decimal` core stays
# heap-free).
dyn = ["alloc"]
# Opt out of strict dispatch: plain transcendentals forward to the
# f64 bridge. Only takes effect when `strict` is NOT enabled — if
# both are present, strict wins. Both `*_strict` and `*_fast`
# named methods are emitted regardless of which feature is on; this
# feature only chooses what plain `*` resolves to.
#
# Implies `std`: the f64 bridge uses the inherent `f64` transcendental
# intrinsics (`sin`/`cos`/`exp`/…), which are std-only under the crate's
# float policy (std owns floats; no_std is integer-only, never libm). So
# `fast` is a std-build convenience and cannot combine with `no_std`.
fast = ["std"]
# Compiles BOTH the macro-default and the per-type override
# implementations for every method that has them. Default builds compile
# only the chosen winner (see OVERRIDE_POLICY.md). With `bench-alt` on
# benchmarks can call `*_strict_default` and `*_strict_override` side by
# side without recompiling. Off by default — adds build time and binary
# size for no runtime benefit unless you're benching.
bench-alt = []
# Gates the heavy `ulp_strict_golden` mpmath-oracle suite (a `[[test]]`
# `required-features`). OFF in the `tests (gate)` CI job so it stays fast;
# ON in the dedicated `golden (gate)` job + precision.yml (run in release).
# A no-op feature — it only toggles whether that test target compiles/runs.
golden = []
# Compile-time selector for the default RoundingMode used by the
# no-arg `rescale` family (and any future default-rounding methods).
# If none of these is enabled, the default is HalfToEven (IEEE-754
# default; banker's rounding). Mutually exclusive in intent — if more
# than one is enabled, the priority order in `src/rounding.rs` picks
# canonically.
rounding-half-away-from-zero = []
rounding-half-toward-zero = []
rounding-trunc = []
rounding-floor = []
rounding-ceiling = []
# Nightly-only: expose `from_f16` / `to_f16` /
# `from_f128` / `to_f128` on each decimal type. f16 and
# f128 are experimental in Rust; this feature requires the nightly
# toolchain. On stable, leave the feature off.
experimental-floats = []
# Nightly-only: auto-inferred cross-scale operations via
# `generic_const_exprs`. Adds a `decimal_scaled::cross` module with
# free functions `cross::mul(a, b)` / `cross::add(a, b)` / …
# returning a decimal at `max(width_a, width_b)`, `max(SCALE_a,
# SCALE_b)`. Without this feature the stable `D{N}<S>::mul_of(a, b)`
# explicit-target form is the only cross-scale entry point.
# Requires the nightly toolchain.
cross-scale-ops = []
# Root-kernel work-scratch sizing. Default (neither feature) sizes the
# scratch buffers to the build-max width and applies it uniformly. With
# `exact-scratch` (stable) each storage width gets a per-`Int<N>` impl
# sized exactly `mult·N + ceil(N/2)` — smaller frames, no nightly.
# `exact-scratch-nightly` does the same per-`N` sizing with one blanket
# impl via `generic_const_exprs` (the const-expr stays in that impl block).
# See `crate::int::types::compute_limbs`.
exact-scratch = []
exact-scratch-nightly = ["exact-scratch"]
# Wide decimal tiers (D57 … D1232). Each width is independently opt-in
# (`d57` … `d1232`), and the umbrellas NEST: `wide` = D57/D76/D115/D153/
# D230/D307, `x-wide` = `wide` + D462 + D616, `xx-wide` = `x-wide` + D924 +
# D1232 — so a wider umbrella enables every tier up to it. All are backed by
# the in-tree const-generic `Int<N>` integers in `crate::int` — no external
# big-integer dependency. D18 / D38 use primitive i64 / i128 storage and need
# none of this.
# Internal marker: enabled by EVERY wide-family tier (d57 … d1232) so
# the shared wide-tier support code (the `wide_roots` /
# `wide_transcendental` macro modules, the `decl_wide_serde` macro, the
# `DecimalConstants` / `Int` imports in `consts/wide.rs`, etc.) is
# compiled in whenever any single wide tier is on. Not meant to be set
# directly by downstreams — turn on a concrete tier (or an umbrella)
# instead. Without this marker each shared-support `cfg` would have to
# enumerate all twelve tier features by hand and a single-tier build
# (`--features d57`) would miss the support it depends on.
#
# Heap-free (Phase 9): the wide-tier transcendental lookup tables used to
# be heap-cached (`thread_local!` + `alloc::vec::Vec`); those runtime
# caches were removed in favour of stateless on-stack recompute, so the
# wide-support path no longer needs `alloc`. This marker pulls in NO
# features — `_wide-support = []` keeps it as the heap-free backstop: a
# `no_std` single-tier build (`--no-default-features --features d57`) gets
# no `alloc`, so any reintroduced `alloc::vec::Vec` on the wide path is a
# hard compile error rather than a silent heap allocation. (`std` still
# pulls `alloc` for the std build; that is the std backend's own affair.)
_wide-support = []
wide = ["d57", "d76", "d115", "d153", "d230", "d307"]
d57 = ["_wide-support"]
d76 = ["_wide-support"]
d115 = ["_wide-support"]
d153 = ["_wide-support"]
d230 = ["_wide-support"]
# Very-wide tiers (D462 + D616), nesting `wide`. Gated separately because
# their strict-transcendental work integers run into thousands of bits and
# inflate build time vs the narrower wide tiers.
x-wide = ["wide", "d462", "d616"]
d307 = ["_wide-support"]
d462 = ["_wide-support"]
d616 = ["_wide-support"]
# Extra-wide tiers (D924 + D1232), nesting `x-wide`. Pulls in the Int12288 /
# Int16384 work integers — multi-second compile-time cost for the macro emission.
xx-wide = ["x-wide", "d924", "d1232"]
d924 = ["_wide-support"]
d1232 = ["_wide-support"]
# Internal perf-investigation feature: emits `tracing::info_span!`
# blocks at the section boundaries of the wide-tier strict
# transcendental cores (`exp_fixed`, `ln_fixed`, …). With
# `tracing-chrome` set up in an example, the resulting JSON loads in
# https://ui.perfetto.dev for a per-section flame view. Default-off;
# the spans compile to nothing without the feature, so production
# users see zero overhead.
perf-trace = ["dep:tracing"]

[dependencies]
serde = { version = "1", features = ["derive"], optional = true }
# No `libm`: the crate's float policy is std-owns-floats / no_std-is-
# integer-only, so we never use `num_traits::Float` (which is the only
# part needing libm under no_std). num-traits is kept solely for the
# `FromPrimitive`/`ToPrimitive`/`NumCast` bridge used by `from_num`/
# `to_num`, none of which require libm.
num-traits = { version = "0.2", default-features = false }
decimal_scaled_macros = { path = "macros", version = "0.5.0", default-features = false, optional = true }
tracing = { version = "0.1", default-features = false, features = ["std"], optional = true }

[dev-dependencies]
decimal-scaled-golden = { path = "decimal-scaled-golden" }
criterion = { version = "4.6.0", default-features = false, features = ["cargo_bench_support", "html_reports"], package = "codspeed-criterion-compat" }
i256 = { version = "0.2", default-features = false }
serde_json = "1"
postcard = { version = "1", default-features = false, features = ["alloc"] }
decimal_scaled_macros = { path = "macros" }
# Perf-trace examples wire tracing-chrome to write Perfetto/Chrome JSON.
tracing-chrome = "0.7"
tracing-subscriber = { version = "0.3", default-features = false, features = ["std"] }
# Benchmark-only baselines for the backend comparisons (see benches/).
# None of these are normal dependencies.
bnum = { version = "0.14", default-features = false }
ruint = { version = "1", default-features = false }
rust_decimal = { version = "1", default-features = false, features = ["maths"] }
fixed = "1"
# g_math: another fixed-point arithmetic crate that claims "0 ULP
# transcendentals". Used as a benchmark baseline + accuracy comparison
# (see benches/g_math_comparison.rs).
g_math = "0.4"
# Library-comparison comparators for the §5 chapter in docs/benchmarks.md.
# All bench-only; never compiled into a normal build.
fastnum = { version = "0.7", default-features = false, features = ["std"] }
bigdecimal = "0.4"
dashu-float = "0.4"
# dashu-int provides IBig for the deep-scale shootout's exact base-10
# integer scaling of dashu-float results (benches/lib_cmp_precision.rs).
dashu-int = { version = "0.4", default-features = false, features = ["std"] }
decimal-rs = "0.1"
scientific = "0.5"
# Chart generation for docs/figures/library_comparison/*.png — pure
# Rust, no Python dep. Driven by examples/chart_gen.rs.
plotters = { version = "0.3", default-features = false, features = ["bitmap_backend", "bitmap_encoder", "line_series", "ttf"] }
# Property-based fuzz coverage for the strict transcendentals — see
# tests/ulp_proptest.rs. Pinned 1.x for deterministic, fixed-seed
# minimisation when a counterexample is found.
proptest = "1"
# Pin the bench process to a single core (int_ops_micro + the
# precision-fix impact microbench) so the criterion timing loop doesn't
# migrate cross-core mid-measurement. Cross-platform, MIT/Apache. Bench-only.
core_affinity = "0.8"

# Profiling / internal-benchmark examples need extra features; gating them
# with required-features means a plain `cargo test` (without these features)
# skips them rather than failing to build.
[[example]]
name = "karabench"
required-features = ["bench-alt"]

[[example]]
name = "karabench_u64"
required-features = ["bench-alt"]

[[example]]
name = "int_div_probe"
required-features = ["wide", "x-wide", "xx-wide", "bench-alt"]

[[example]]
name = "ln_probe"
required-features = ["wide", "x-wide", "xx-wide"]

[[example]]
name = "atan_probe"
required-features = ["wide", "x-wide", "xx-wide"]

[[example]]
name = "profile_atan_perfetto"
required-features = ["perf-trace"]

[[example]]
name = "profile_exp_perfetto"
required-features = ["perf-trace"]

# Examples/tests that reference the wide-only decimal tiers (D57…D1232)
# must declare the tier features they use, so a default `cargo build
# --all-targets` (narrow tiers only) skips them instead of failing to
# build with E0432 unresolved-import on the wide types.
[[example]]
name = "agm_mpmath_validate"
required-features = ["x-wide", "xx-wide"]

[[example]]
name = "divbench"
required-features = ["wide", "x-wide"]

[[example]]
name = "expbench"
required-features = ["wide", "x-wide"]

[[example]]
name = "hyper_recover"
required-features = ["wide", "x-wide", "xx-wide"]

[[example]]
name = "profile_exp"
required-features = ["x-wide"]

[[example]]
name = "rounding_mode_probe"
required-features = ["wide"]

[[example]]
name = "mul_toom3_probe"
required-features = ["wide", "bench-alt"]

[[example]]
name = "profile_rescale"
required-features = ["wide", "x-wide", "xx-wide", "macros", "bench-alt"]

[[example]]
name = "sqrtbench"
required-features = ["wide", "x-wide"]

[[example]]
name = "test_pi"
required-features = ["wide", "x-wide", "xx-wide"]

[[example]]
name = "ulp_report"
required-features = ["wide"]

# `ulp_strict_golden` pulls in the wide precision harness
# (`tests/support/precision_subject_ds.rs`, which names every tier); both
# it and the wide serde surface need the tier features.
[[test]]
name = "serde_surface"
required-features = ["wide", "x-wide", "xx-wide"]

[[test]]
name = "ulp_strict_golden"
# `golden` gates this heavy suite OUT of the `tests (gate)` CI job (which
# does NOT pass `golden`) so that job stays fast (builds-all + the quick
# suite); the dedicated `golden (gate)` CI job + precision.yml pass `golden`
# to build and run it (in release). Local: add `,golden` to run it.
required-features = ["wide", "x-wide", "xx-wide", "golden"]

# `micro_golden` is the FAST agent-validation subset of `ulp_strict_golden`
# (same harness + same `lsbe == 0` zero-tolerance assertion, capped rows);
# wide-feature gated so a plain `cargo build --all-targets` skips it.
[[test]]
name = "micro_golden"
required-features = ["wide", "x-wide", "xx-wide"]

# `atan_tang_band_accuracy` is a focused zero-tolerance gate for the D57
# atan Tang band (SCALE 44..=56) — the cells `ulp_strict_golden`'s D57
# row (run at SCALE 28) does not cover. Validates the baked-table atan
# path is correctly rounded at the band edge. Wide-feature gated.
[[test]]
name = "atan_tang_band_accuracy"
required-features = ["wide", "x-wide", "xx-wide"]

# `sanity_golden` exercises the EXACT (non-transcendental) decimal ops with
# a wide-tier (D307) spot-check, so it needs the x-wide tier feature; a plain
# `cargo build --all-targets` (default) therefore skips it.
[[test]]
name = "sanity_golden"
required-features = ["x-wide"]

[[bench]]
name = "mul_div_candidates"
path = "benches/micro/mul_div_candidates.rs"
harness = false

[[bench]]
name = "dec_mul_wide_ab"
path = "benches/micro/dec_mul_wide_ab.rs"
harness = false
required-features = ["wide", "x-wide"]

# Focused micro-bench for the wide-int decimal `to_string` base case
# (#38): base-10^19 19-digit chunking vs the historic one-divide-per-
# digit loop, across Int256 / Int512 / Int1024 / Int4096.
[[bench]]
name = "int_to_string_base1e19"
path = "benches/micro/int_to_string_base1e19.rs"
harness = false
required-features = ["wide", "x-wide", "xx-wide"]

# Per-PR perf-regression gate, driven by CodSpeed under simulation
# instrumentation. See .github/workflows/codspeed.yml.
[[bench]]
name = "pr_gate"
path = "benches/micro/pr_gate.rs"
harness = false
required-features = ["wide"]

[[bench]]
name = "all_functions"
path = "benches/support/all_functions.rs"
harness = false

# Focused micro-bench for the powf_strict integer-exponent fast path
# (perf/powf-integer-fastpath-0.4.3). Compares the integer-valued
# exponents 2.0 / 3.0 (fast path) against the non-integer 0.5 / 2.5
# (slow exp(y · ln x) path) across D38<19>, D76<35>, D307<150>.
[[bench]]
name = "powf_integer"
path = "benches/micro/powf_integer.rs"
harness = false
required-features = ["wide", "x-wide"]

# Focused micro-bench for D38<33>::log10_strict / log2_strict / etc.
# Used to validate the borrow-D57 migration of the secondary log/exp
# entry points (ln/exp were borrowed by commit 09e7ea9).
[[bench]]
name = "d38_s33_log10_micro"
path = "benches/lookup/d38_s33_log10_micro.rs"
harness = false
required-features = ["wide"]

# Wide-integer backend comparison: native hand-rolled `Int256` vs
# `bnum` / `ruint`. Needs the wide tier.
[[bench]]
name = "wide_int_backends"
path = "benches/backends/wide_int_backends.rs"
harness = false
required-features = ["wide"]

# Per-width baseline for the in-tree wide signed integers
# (`Int256` … `Int4096`): add/sub/mul/div/rem, pow, square, cube.
# Microbench-scale snapshot for tracking integer-algorithm changes.
[[bench]]
name = "int_ops_micro"
path = "benches/micro/int_ops_micro.rs"
harness = false
required-features = ["wide"]

# Decimal / fixed-point backend comparison: native `D38` / `D76` vs
# `bnum`-backed `D76`, `rust_decimal`, and `fixed` — arithmetic and
# transcendentals (including the fast vs strict variants). Needs the
# wide tier.
[[bench]]
name = "decimal_backends"
path = "benches/backends/decimal_backends.rs"
harness = false
required-features = ["wide"]

# D38 mul / div: native Moller-Granlund path vs the wide-arm
# (Int256-widening) algorithm head-to-head.
[[bench]]
name = "d_w128_mul_div_paths"
path = "benches/micro/d_w128_mul_div_paths.rs"
harness = false
required-features = ["wide"]

# Newton-Raphson reciprocal divide vs MG chain divide at D307/D616/D1232.
# Research bench — informs ALGORITHMS.md "Evaluated and not used".
[[bench]]
name = "newton_vs_mg"
path = "benches/micro/newton_vs_mg.rs"
harness = false
required-features = ["wide", "x-wide", "xx-wide", "bench-alt"]

# AGM vs artanh / Taylor strict transcendentals at the deepest tier
# (D307<300>). Tracks the AGM path's throughput so a future bench-
# driven promotion has a data point.
[[bench]]
name = "agm_vs_taylor"
path = "benches/agm/agm_vs_taylor.rs"
harness = false
required-features = ["x-wide"]

# AGM vs artanh / Taylor across the D616 scale band — 250 / 300 / 400 /
# 500. Brent's AGM ln crossover is around ~300 decimal digits, so D616
# straddles the transition. Captures the data for a future width-
# override decision on the deep mid-storage band.
[[bench]]
name = "agm_vs_taylor_d616"
path = "benches/agm/agm_vs_taylor_d616.rs"
harness = false
required-features = ["x-wide"]

# AGM vs artanh / Taylor at D924 — the first half-width tier whose
# upper SCALE band (700+) might tip past the Brent AGM crossover after
# D616 measurements (SCALE 250/300/400/500) all showed AGM LOSING.
[[bench]]
name = "agm_vs_taylor_d924"
path = "benches/agm/agm_vs_taylor_d924.rs"
harness = false
required-features = ["xx-wide"]

# AGM vs artanh / Taylor at D230<115>. Mid-storage crossover probe:
# the AGM ln crossover (Brent 1976) is around ~300 decimal digits;
# D230<115> sits at ~131 working-bit decimal digits and is expected
# to LOSE to Brent-reduced artanh — the bench captures the data
# point for completeness.
[[bench]]
name = "agm_vs_taylor_d230"
path = "benches/agm/agm_vs_taylor_d230.rs"
harness = false
required-features = ["wide"]

# Per-width full_matrix slice — one bench binary per decimal width.
